本契約は、本連携に関して甲乙間で開示される患者・利用者情報、医療・介護・福祉情報および業務上の機密情報等を適切に管理し、関係者のプライバシーを保護するとともに、安全な業務連携を実現することを目的とする。

第2条（秘密情報の定義）
本契約における「秘密情報」とは、書面・口頭・電子データ等の形式を問わず、本連携に関連して相手方から開示された以下の情報をいう。
（1）患者・利用者の氏名・生年月日・住所・診断名・医療処置・介護情報・家族構成その他の個人情報

（ア）開示を受けた時点で既に公知であった情報

（ウ）受領者が正当な権限を有する第三者から秘密保持義務なく取得した情報

第3条（秘密保持義務）
甲および乙は、相手方から開示された秘密情報を厳に秘密として保持し、事前の書面による承諾なく第三者に開示・漏洩してはならない。本連携の目的以外に秘密情報を使用してはならない。

第4条（開示範囲の制限）
甲および乙は、秘密情報を本連携の遂行に必要な範囲の役員・従業員・外部専門家（弁護士・医師・ケアマネジャー・相談員等）にのみ開示することができる。この場合、当該者に本契約と同等の秘密保持義務を遵守させる責任を負う。

第5条（情報管理）
甲および乙は、秘密情報の漏洩・紛失・改ざんを防止するため、合理的な安全管理措置を講じる。電子データについては適切なアクセス制限を設け、目的外の複製・送信を行わない。

第6条（複製・改変の禁止）
甲および乙は、相手方の事前の書面による承諾なく秘密情報を複製・改変してはならない。承諾を得て複製した場合も、複製物は本契約と同等の管理に服する。

第7条（知的財産権）

// ── API Helper ──
async function api(path,opts={}){
  const headers={};
  // v5.0.4: FormData の場合は Content-Type を設定しない（multipart boundary をブラウザが自動付与）
  if(!opts.isFormData)headers['Content-Type']='application/json';
  if(S.token)headers['Authorization']='Bearer '+S.token;
  // silent404: 404 をエラー扱いせず null を返す（「該当なし」を期待する API 用）
  const silent404 = opts.silent404 === true;
  // sanitize opts before fetch
  const fetchOpts = {...opts};
  delete fetchOpts.silent404;
  delete fetchOpts.isFormData;
  // v4.19: ネットワーク失敗時に1回だけ自動リトライ（500ms後）
  const doFetch = async () => {
    return await fetch(API+path,{...fetchOpts,headers:{...headers,...(fetchOpts.headers||{})}});
  };
  try{
    let res;
    try{
      res = await doFetch();
    }catch(netErr){
      // ERR_CONNECTION_CLOSED 等の場合、1回だけリトライ
      console.warn('api network error, retrying once:',path,netErr);
      await new Promise(r=>setTimeout(r,500));
      try{
        res = await doFetch();
      }catch(retryErr){
        console.error('api retry failed:',path,retryErr);
        return null;
      }
    }
    const data=await res.json().catch(()=>({}));
    if(!res.ok){
      if(res.status===401){stopNotifPolling();S.token=null;S.user=null;S.moduleAccess=null;S.unreadCount=0;localStorage.removeItem('medadapt_token');localStorage.removeItem('medadapt-autologin');localStorage.removeItem('medadapt-last-email');try{sessionStorage.removeItem('medadapt-invite-token');}catch(e){}S.scr='login';rr();return null;}
      // 404 は silent404 オプション時はサイレントに（「Not found」バッジ問題対策）
      if(res.status===404 && silent404){return null;}
      // エラーメッセージのユーザーフレンドリー化（v5.0.5: バリエーション網羅）
      const rawErr = String(data.error||'').trim();
      const lowerErr = rawErr.toLowerCase();
      let errMsg;
      if(lowerErr==='not found' || lowerErr==='not_found' || lowerErr==='notfound' || res.status===404){
        errMsg = '対象が見つかりません';
      } else if(res.status===403){
        errMsg = rawErr || 'アクセス権限がありません';
      } else if(res.status>=500){
        errMsg = '一時的なエラーが発生しました。しばらくしてからお試しください';
      } else {
        errMsg = rawErr || 'エラーが発生しました';
      }
      toast(errMsg);return null;
    }
    return data;
  }catch(e){console.error('API error:',e);return null;}
}

function renderBillingEvent(ev){
  const dt=new Date(ev.created_at);
  const yyyy=dt.getFullYear(),mm=String(dt.getMonth()+1).padStart(2,'0'),dd=String(dt.getDate()).padStart(2,'0');
  const hh=String(dt.getHours()).padStart(2,'0'),mi=String(dt.getMinutes()).padStart(2,'0');
  const tsLabel=yyyy+'-'+mm+'-'+dd+' '+hh+':'+mi;
  const d=ev.event_data||{};
  let summary='';
  if(ev.event_type==='subscription_started'){
    const mc=d.member_count||1;const amt=d.amount_jpy||(200*mc);
    summary='契約開始（'+mc+'名・¥'+amt.toLocaleString()+'/月）';
  }else if(ev.event_type==='subscription_resumed'){
    const mc=d.member_count||1;const amt=d.amount_jpy||(200*mc);
    summary='再契約（'+mc+'名・¥'+amt.toLocaleString()+'/月）';
  }else if(ev.event_type==='card_changed'){
    const oc=d.old_card,nc=d.new_card||{};
    const ncStr=brandToLabel(nc.brand)+' •••• '+(nc.last_4||'****');
    if(oc&&oc.last_4){summary='カード変更：'+brandToLabel(oc.brand)+' •••• '+oc.last_4+' → '+ncStr;}
    else{summary='カード登録：'+ncStr;}
  }else if(ev.event_type==='cancelled'){
    summary='解約（即時）';
  }else if(ev.event_type==='cancel_scheduled'){
    const m=d.scheduled_cancel_month||'';const ymLabel=m?(m.split('-')[0]+'年'+parseInt(m.split('-')[1]||'0',10)+'月'):'';
    summary='解約予約：'+ymLabel+'末';
  }else if(ev.event_type==='unschedule_cancel'){
    summary='解約予約 取消';
  }else{
    summary=ev.event_type;
  }
  const actor=ev.actor_name?(ev.actor_name+'（'+(ev.actor_login_id||'')+'）'):(ev.actor_login_id||'-');
  return h('div',{style:{padding:'8px 10px',background:'#f8fafc',border:'1px solid var(--border)',borderRadius:'6px',fontSize:'12px',lineHeight:'1.6'}},
    h('div',{style:{fontWeight:'600',color:'var(--ink)'}},summary),
    h('div',{style:{fontSize:'11px',color:'var(--ink-m)',marginTop:'2px'}},tsLabel+' ・ '+actor)
  );
}

async function loadSquareSdk(){
  if(SQ.payments)return SQ.payments;
  if(SQ.loading){
    return new Promise(resolve=>{const w=()=>SQ.payments?resolve(SQ.payments):setTimeout(w,100);w();});
  }
  SQ.loading=true;SQ.error=null;
  try{
    const cfg=await api('/billing/sdk-config',{method:'GET',silent404:true});
    if(!cfg||!cfg.application_id||!cfg.location_id)throw new Error('SQUARE_APP_ID または SQUARE_LOCATION_ID が未設定');
    SQ.cfg=cfg;
    if(!window.Square){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src=cfg.sdk_url;s.onload=res;s.onerror=()=>rej(new Error('Square SDK ロード失敗'));document.head.appendChild(s);});
    }
    SQ.payments=window.Square.payments(cfg.application_id,cfg.location_id);
    SQ.sdk=window.Square;
  }catch(e){SQ.error=e.message;}
  SQ.loading=false;
  return SQ.payments;
}

// v29 Phase 4: zipcloud で郵便番号→住所自動補完
async function fetchAddressByZip(zip){
  const cleaned=String(zip||'').replace(/[^\d]/g,'');
  if(cleaned.length!==7)return null;
  try{
    const r=await fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode='+cleaned);
    const d=await r.json();
    if(d.status!==200||!d.results||!d.results.length)return null;
    const a=d.results[0];
    return{pref:a.address1||'',city:a.address2||'',town:a.address3||'',full:(a.address1||'')+(a.address2||'')+(a.address3||'')};
  }catch(e){return null;}
}

// v29 Phase 4: カードブランドにより独自 ZIP 欄の表示制御
// AVS 対象国（VISA/MC/AMEX/Discover）→ SDK 側 ZIP 欄が出るので独自欄を隠す
// JCB/銀聯/不明 → 独自欄を表示し、tokenize 時に postalCode を渡す
function applyZipBlockVisibility(brand){
  const block=document.getElementById('app-zip-block');
  if(!block)return;
  const b=String(brand||'').toUpperCase();
  const sdkShowsZip=['VISA','MASTERCARD','AMERICAN_EXPRESS','AMEX','DISCOVER','DISCOVER_DINERS'].includes(b);
  block.style.display=sdkShowsZip?'none':'';
}

// v29 Phase 4: 独自 ZIP 欄の検索ボタンと入力欄の動作を bind（独自 ZIP 欄が DOM 配置された後に呼ぶ）
function bindZipBlock(){
  const inp=document.getElementById('app-zip-input');
  const btn=document.getElementById('app-zip-search');
  const disp=document.getElementById('app-addr-display');
  if(!inp||!btn||!disp)return;
  const run=async()=>{
    const zip=inp.value.trim();
    if(!/^\d{7}$/.test(zip)){disp.textContent='郵便番号は7桁の数字で入力してください';disp.style.color='#dc2626';return;}
    disp.textContent='検索中...';disp.style.color='var(--ink-m)';
    const addr=await fetchAddressByZip(zip);
    if(!addr){disp.textContent='該当する住所が見つかりません';disp.style.color='#dc2626';return;}
    disp.textContent='✓ '+addr.full;disp.style.color='#0c4a6e';
  };
  btn.onclick=run;
  inp.onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault();run();}};
  // v29: 入力修正時に古いエラー/結果メッセージをクリア
  inp.oninput=()=>{disp.textContent='';};
}

// v29 Phase 4: tokenize 用 billingContact.postalCode を独自 ZIP 欄から取得
// 独自欄が display:none（AVS 対象ブランド時）の場合は送らない（SDK 側 ZIP 欄と二重送信防止）
function getZipForTokenize(){
  const block=document.getElementById('app-zip-block');
  if(block&&block.style.display==='none')return '';
  const inp=document.getElementById('app-zip-input');
  const v=inp&&inp.value?inp.value.trim():'';
  return /^\d{7}$/.test(v)?v:'';
}

async function initSquareCard(){
  try{
    const ct=document.getElementById('sq-card-container');
    if(!ct)return;
    if(SQ.card){try{await SQ.card.destroy();}catch(e){}SQ.card=null;}
    if(!SQ.payments){await loadSquareSdk();}
    if(SQ.error){const st=document.getElementById('sq-status');if(st)st.textContent='SDK初期化失敗: '+SQ.error;return;}
    if(!SQ.payments)return;
    SQ.card=await SQ.payments.card();
    await SQ.card.attach('#sq-card-container');
    // v29 Phase 4: ブランド変化で独自 ZIP 欄の表示切替
    try{SQ.card.addEventListener('cardBrandChanged',(ev)=>{const b=ev&&ev.detail&&ev.detail.cardBrand;applyZipBlockVisibility(b);});}catch(e){}
    // 独自 ZIP 欄のバインド（DOM 配置済の場合のみ機能）
    bindZipBlock();
  }catch(e){
    const st=document.getElementById('sq-status');if(st)st.textContent='カード入力初期化失敗: '+e.message;
  }
}

// 解約予約モーダル
function showScheduleCancelModal(){
  const m=h('div',{className:'modal',style:{maxWidth:'440px'}});
  const now=new Date();
  // 来月から12ヶ月先までを選択肢に（当月を含めるか議論あるが、今月締めで予約=今月末退職に対応するため当月も含める）
  const opts=[];
  for(let i=0;i<13;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const lbl=d.getFullYear()+'年'+(d.getMonth()+1)+'月末で解約'+(i===0?'（今月末）':i===1?'（翌月末）':'');
    opts.push({v:ym,l:lbl});
  }
  let selected=opts[1].v; // 翌月末をデフォルトに
  m.appendChild(h('h3',{style:{fontSize:'17px',fontWeight:'800',marginBottom:'12px'}},'解約日を予約'));
  m.appendChild(h('div',{style:{fontSize:'12px',color:'var(--ink-m)',marginBottom:'14px',lineHeight:'1.7'}},'指定した月の末日まで通常通りご利用いただけます。指定月の請求が確定した時点で自動的に解約されます。予約はいつでも取消可能です。'));
  m.appendChild(fld('解約予定月','sc_month',selected,v=>{selected=v},{opts:opts}));
  m.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'16px',justifyContent:'flex-end'}},
    btn('キャンセル','btn-sec',()=>{S.modal=null;rr();}),
    btn('この日程で予約する','btn-pri',async()=>{
      const month=document.getElementById('sc_month')?.value||selected;
      const res=await api('/billing/schedule-cancel',{method:'POST',body:JSON.stringify({month})});
      if(res&&res.success){
        toast('解約予約を登録しました');
        S.modal=null;
        await refreshBillingInfo();rr();
      }else{
        toast(res?.error||'予約に失敗しました');
      }
    })
  ));
  S.modal=m;rr();
}

// コンパクトリスト共通描画（件数切替3/5・もっと見る・上下に閉じるボタン・任意フィルタチップ）
function compactSection(opts){
  const w=h('div');
  const total=opts.items.length;
  w.appendChild(h('div',{className:'section-label'},opts.title+'（'+total+'件）'));
  if(total===0){w.appendChild(h('div',{style:{color:'var(--ink-m)',marginBottom:'20px',fontSize:'13px'}},opts.emptyText||'なし'));return w}
  let filtered=opts.items;
  // フィルタチップ（任意）
  if(opts.filters&&opts.filterFn){
    if(!S[opts.filterKey])S[opts.filterKey]='all';
    const cnt=k=>k==='all'?total:opts.items.filter(opts.filterFn(k)).length;
    const chips=h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'8px'}});
    opts.filters.forEach(f=>{const n=cnt(f.k);if(n===0&&f.k!=='all')return;const isAct=S[opts.filterKey]===f.k;chips.appendChild(h('div',{style:{padding:'5px 12px',borderRadius:'14px',fontSize:'11px',fontWeight:'600',cursor:'pointer',userSelect:'none',background:isAct?'var(--accent)':'#f1f5f9',color:isAct?'#fff':'var(--ink-m)',border:isAct?'1px solid var(--accent)':'1px solid #e2e8f0'},onClick:()=>{S[opts.filterKey]=f.k;S[opts.expandKey]=false;rr()}},f.l+'('+n+')'))});
    w.appendChild(chips);
    if(S[opts.filterKey]!=='all')filtered=opts.items.filter(opts.filterFn(S[opts.filterKey]));
  }
  const size=S[opts.sizeKey]||5;
  const expanded=S[opts.expandKey]===true;
  const visible=expanded?filtered:filtered.slice(0,size);
  // 上部コントロール: 件数切替（3/5）+ 展開時の閉じるボタン
  const ctrl=h('div',{style:{display:'flex',gap:'6px',alignItems:'center',marginBottom:'8px',justifyContent:'flex-end',flexWrap:'wrap'}});
  if(total>3){
    [3,5].forEach(n=>{const isAct=size===n;ctrl.appendChild(h('div',{style:{padding:'3px 10px',borderRadius:'12px',fontSize:'11px',fontWeight:'600',cursor:'pointer',userSelect:'none',background:isAct?'#1e293b':'#f1f5f9',color:isAct?'#fff':'var(--ink-m)',border:'1px solid '+(isAct?'#1e293b':'#e2e8f0')},onClick:()=>{S[opts.sizeKey]=n;S[opts.expandKey]=false;rr()}},n+'件'))});
  }
  if(expanded&&filtered.length>size){ctrl.appendChild(h('div',{style:{padding:'3px 10px',borderRadius:'12px',fontSize:'11px',fontWeight:'600',cursor:'pointer',userSelect:'none',color:'var(--accent)',border:'1px solid var(--accent)',background:'#fff'},onClick:()=>{S[opts.expandKey]=false;rr()}},'▲ 閉じる'))}
  if(ctrl.children.length>0)w.appendChild(ctrl);
  // リスト本体
  const list=h('div',{style:{marginBottom:opts.sectionMargin||'24px'}});
  visible.forEach(item=>list.appendChild(opts.itemRenderer(item)));
  if(filtered.length>size){list.appendChild(h('div',{style:{textAlign:'center',padding:'8px',marginTop:'4px',cursor:'pointer',color:'var(--accent)',fontSize:'12px',fontWeight:'600',userSelect:'none',border:'1px dashed #cbd5e1',borderRadius:'8px',background:'#f8fafc'},onClick:()=>{S[opts.expandKey]=!expanded;rr()}},expanded?'▲ 閉じる':'▼ もっと見る ('+(filtered.length-size)+'件)'))}
  w.appendChild(list);
  return w;
}
function toast(m){
  // v4.19: 同じメッセージが3秒以内に再度出るのを抑制（連続エラー時のループ防止）
  if(S._lastToast && S._lastToast.msg === m && (Date.now() - S._lastToast.at < 3000)) return;
  S._lastToast = {msg:m, at:Date.now()};
  S.toast=m;
  if(S.tt)clearTimeout(S.tt);

async function loadNotifications(){
  if(!S.token)return;
  try{
    const res=await fetch(API+'/notifications/unread',{headers:{'Authorization':'Bearer '+S.token}});
    if(res.ok){
      const d=await res.json();
      const prev=S.unreadCount;
      S.unreadCount=d.count||0;
      if(S.unreadCount!==prev)rr();
      S._notifFailCount = 0;  // 成功時にリセット
      return true;
    }
    return false;
  }catch(e){
    // v4.20: ERR_CONNECTION_CLOSED 等の連続失敗をカウント
    S._notifFailCount = (S._notifFailCount||0) + 1;
    return false;
  }
}
let _notifTimer=null;
function startNotifPolling(){
  if(_notifTimer)clearInterval(_notifTimer);
  S._notifFailCount = 0;
  loadNotifications();
  // v4.20: 連続失敗が5回を超えたらポーリングを止める（ユーザ操作で再開可）
  const tick = async () => {
    if((S._notifFailCount||0) >= 5){
      console.warn('Notification polling stopped after 5 consecutive failures');
      stopNotifPolling();
      return;
    }
    await loadNotifications();
  };
  _notifTimer=setInterval(tick,30000);
}
function stopNotifPolling(){if(_notifTimer){clearInterval(_notifTimer);_notifTimer=null;}}

}

async function loadFromCloud(){
  if(!S.token)return;
  try{
    const res=await fetch(API+'/sync',{headers:{'Authorization':'Bearer '+S.token}});
    if(res.ok){
      const data=await res.json();
      if(data){
        // クラウドにデータがある場合のみ上書き（空の場合はlocalStorageを保持）
        const cloudHasData = (data.patients?.length||0) + (data.cases?.length||0) + (data.conferences?.length||0) + (data.monitors?.length||0) > 0;
        const localHasData = (D.patients?.length||0) + (D.cases?.length||0) + (D.conferences?.length||0) + (D.monitors?.length||0) > 0;
        if(data.patients&&data.patients.length)D.patients=data.patients;
        if(data.cases&&data.cases.length)D.cases=data.cases;
        if(data.conferences&&data.conferences.length)D.conferences=data.conferences;
        if(data.monitors&&data.monitors.length)D.monitors=data.monitors;
        if(data.assessments&&data.assessments.length)D.assessments=data.assessments;
        if(data.user)S.user={...S.user,...data.user};
        try{localStorage.setItem(K,JSON.stringify(D))}catch(e){}
        // v4.20: ローカルにデータがあってクラウドが空の場合、初回ログイン or D1リセット後と判断して
        // ローカルデータをクラウドへ即push（同意書発行等の前提条件を整える）
        if(localHasData && !cloudHasData){
          try{
            await fetch(API+'/sync',{
              method:'POST',
              headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.token},
              body:JSON.stringify(D)
            });
          }catch(e){console.warn('initial sync push failed:',e);}
        }
      }
    }
  }catch(e){}
}

function revokeShareOnNG(c){
  // NGになったケースの患者に紐づく共有を取消（記録は残す）
  const pt=D.patients.find(p=>p.id===c.patientId);
  if(!pt||!pt.sharedWith)return;
  // ケースの参加者の事業所を特定し、その共有を取消
  const partOrgs=(c.parts||[]).map(p=>p.org).filter(Boolean);
  pt.sharedWith.forEach(sh=>{
    if(sh.status==='active'&&partOrgs.includes(sh.org)){
      sh.status='revoked';
      sh.revokeReason='NG（'+c.st+'）：'+(c.ngReason||'');
      sh.revokedAt=now();
      addAudit(pt.audit||[],'共有自動停止（NG）',sh.org+' - '+c.ngReason);
    }
  });
  D.patients=D.patients.map(x=>x.id===pt.id?pt:x);
}

function freeCheck(type){
  if(!S.user||S.user.plan==='pro')return true;
  // 患者登録数チェック
  if(type==='patients'){
    if(D.patients.length>=3){toast('Freeプランは患者登録3件まで。Proプランへアップグレードしてください。');return false;}
    return true;
  }
  const mo=now().slice(0,7);
  if(!S.user.usage)S.user.usage={};
  if(!S.user.usage[mo])S.user.usage[mo]={cases:0,confs:0,mons:0,assess:0};
  const ug=S.user.usage[mo];
  const lim={cases:1,confs:1,mons:1,assess:1};
  if((ug[type]||0)>=(lim[type]||0)){
    const names={cases:'受入れ・移行ケース',confs:'サービス担当者会議',mons:'モニタリング',assess:'アセスメント'};

  }
  return true;
}

function initSig(sel){setTimeout(()=>{const el=document.querySelector(sel||'.sig');if(!el||el._b)return;el._b=true;let dr=false;const gp=e=>{const r=el.getBoundingClientRect();const cx=e.clientX||(e.touches&&e.touches[0]?e.touches[0].clientX:0);const cy=e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:0);return{x:(cx-r.left)*(el.width/r.width),y:(cy-r.top)*(el.height/r.height)}};el.addEventListener('mousedown',e=>{dr=true;const p=gp(e);el.getContext('2d').beginPath();el.getContext('2d').moveTo(p.x,p.y)});el.addEventListener('mousemove',e=>{if(!dr)return;const p=gp(e);const ctx=el.getContext('2d');ctx.lineWidth=2;ctx.lineCap='round';ctx.strokeStyle='#0f172a';ctx.lineTo(p.x,p.y);ctx.stroke();S.signed=true});el.addEventListener('mouseup',()=>dr=false);el.addEventListener('mouseleave',()=>dr=false);el.addEventListener('touchstart',e=>{e.preventDefault();dr=true;const p=gp(e);el.getContext('2d').beginPath();el.getContext('2d').moveTo(p.x,p.y)},{passive:false});el.addEventListener('touchmove',e=>{e.preventDefault();if(!dr)return;const p=gp(e);const ctx=el.getContext('2d');ctx.lineWidth=2;ctx.lineCap='round';ctx.strokeStyle='#0f172a';ctx.lineTo(p.x,p.y);ctx.stroke();S.signed=true},{passive:false});el.addEventListener('touchend',()=>dr=false)},50)}
function getSig(){try{const cv=document.querySelector('.sig');return cv&&S.signed?cv.toDataURL('image/png'):null}catch(e){return null}}

function fmtSignedTimeJST(iso){
  if(!iso) return '—';
  try{
    const d = new Date(iso);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
    const hh=String(d.getHours()).padStart(2,'0'),mi=String(d.getMinutes()).padStart(2,'0');
    return `${y}-${m}-${dd} ${hh}:${mi}`;
  }catch(e){return iso;}
}

// 共通の電子署名認証バナー（シアン枠）
function buildECertHtml(sd, signerName){
  // v5.0.5: signed_documents には signed_at 列がないため finalized_at / created_at をフォールバックに
  const signedAt = sd && (sd.signed_at || sd.finalized_at || sd.created_at);
  if(!sd || !signedAt) return '';
  const signer = signerName || sd.signer_name || '—';
  const tsa = (sd.tsa_authority||'').toUpperCase() || 'SEIKO';
  const ts = fmtSignedTimeJST(sd.tsa_acquired_at || signedAt);
  return `
  <div style="background:linear-gradient(135deg,#ecfeff 0%,#f0fdfa 100%);border:2px solid #0891b2;border-radius:12px;padding:12px 16px;margin:14px 0;display:flex;gap:12px;align-items:flex-start;font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;">
    <div style="width:36px;height:36px;border-radius:50%;background:#0891b2;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;flex-shrink:0;">✓</div>
    <div style="font-size:11px;line-height:1.7;color:#0e7490;">
      <div style="font-weight:800;font-size:12px;margin-bottom:3px;">電子署名 + タイムスタンプ済</div>
      <div>本書面は <b>e-文書法・電子署名法</b> に準拠した電子署名と、第三者機関のタイムスタンプを付与した上で、<b>SHA-256ハッシュチェーン</b>に登録された原本性保証付き文書です。</div>
      <div style="margin-top:4px;font-size:10px;">署名者: <b>${escapeHtml(signer)}</b>　タイムスタンプ: <b>${ts}</b>　認証局: <b>${escapeHtml(tsa)}</b></div>
    </div>
  </div>`;
}

// 共通のタイムスタンプ証明書ブロック（紫枠）
function buildTimestampCertHtml(sd){
  if(!sd) return '';
  const authorityName = sd.tsa_authority_name || 'セイコータイムスタンプサービス';
  const certNo = sd.tsa_cert_no || '13-001 (令和5年2月16日認定 / 令和7年2月16日更新)';
  const acquiredZ = sd.tsa_acquired_at || '';
  const acquiredJst = fmtSignedTimeJST(acquiredZ);
  const serial = sd.tsa_serial || '—';
  const hashAlgo = sd.hash_algorithm || 'SHA-256';
  const docHash = sd.content_hash || '—';
  return `
  <div style="background:linear-gradient(135deg,#f5f3ff 0%,#eef2ff 100%);border:2px solid #6366f1;border-radius:12px;padding:14px 18px;margin:14px 0;font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;font-size:10px;color:#1f2937;">
    <div style="color:#4f46e5;font-size:11px;font-weight:800;margin-bottom:6px;">🕒 タイムスタンプ証明書</div>
    <div style="color:#64748b;font-size:9px;margin-bottom:8px;">総務省 認定タイムスタンプ業務（時刻認証業務）準拠 / RFC 3161 (TSP)</div>
    <div style="display:grid;grid-template-columns:130px 1fr;gap:3px 10px;line-height:1.6;">
      <div style="font-weight:700;color:#4338ca;">認定タイムスタンプ事業者</div><div>${escapeHtml(authorityName)}</div>
      <div style="font-weight:700;color:#4338ca;">認定番号</div><div>${escapeHtml(certNo)}</div>
      <div style="font-weight:700;color:#4338ca;">付与日時 (JST)</div><div style="font-family:Consolas,Menlo,monospace;">${acquiredJst} (JST / UTC+09:00)</div>
      <div style="font-weight:700;color:#4338ca;">付与日時 (UTC)</div><div style="font-family:Consolas,Menlo,monospace;">${escapeHtml(acquiredZ)}</div>
      <div style="font-weight:700;color:#4338ca;">シリアル番号</div><div style="font-family:Consolas,Menlo,monospace;">${escapeHtml(serial)}</div>
      <div style="font-weight:700;color:#4338ca;">ハッシュアルゴリズム</div><div style="font-family:Consolas,Menlo,monospace;">${escapeHtml(hashAlgo)}</div>
      <div style="font-weight:700;color:#4338ca;">対象文書ハッシュ</div><div style="font-family:Consolas,Menlo,monospace;word-break:break-all;">${escapeHtml(docHash)}</div>

// signed_documents から該当帳票のメタデータを取得
// v5.0.5: Worker レスポンスは {ok:true, signed_document:{...}} ラッパ形式のため、
// signed_document 部分のみアンラップして返す。Worker 側の enrichTsaFields により
// tsa_authority_name / tsa_cert_no / tsa_serial / hash_algorithm / document_hash
// が補完済みの構造化メタデータが含まれる。
async function fetchSignedDocInfo(docKind, docId){
  if(!docKind || !docId) return null;
  const res = await api(`/signed-docs/by-doc/${docKind}/${docId}`, {silent404: true});
  if(!res) return null;
  // 後方互換: signed_document でラップされている場合はアンラップ、そうでない場合はそのまま
  return res.signed_document || res;
}

// HTML escape helper（ヘルパー関数群で使用）
function escapeHtml(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getExtDocs(pt){return((D.externalDocs||[]).filter(d=>d.patientId===pt.id&&!d.archived)||[])}

// v5.0.4: Worker API から取得してローカルキャッシュにマージ
async function fetchExtDocsFromWorker(pt){
  if(!pt||!pt.id)return [];
  try{
    const res=await api('/medical-docs/patient/'+pt.id,{silent404:true});
    if(res&&res.items){
      // Worker から取得したものを localStorage の externalDocs にマージ
      if(!D.externalDocs)D.externalDocs=[];
      const apiDocs=res.items.map(sd=>({
        id:sd.id,patientId:pt.id,doc_kind:sd.doc_kind,title:sd.title||'',
        from_org_name:sd.from_org_name||'',from_org_role:sd.from_org_role||'',
        issued_date:sd.issued_date||'',received_at:sd.received_at||sd.created_at||'',
        signature_level:sd.signature_level||'none',
        retention_required:!!sd.retention_required,retention_years:sd.retention_years||5,
        retention_until:sd.retention_until||'',legal_basis:sd.legal_basis||'',
        version_no:sd.version_no||1,parent_id:sd.parent_document_id||null,
        note:'',share_count:0,shares:[],access_logs:[],audit:[],
        _fromWorker:true
      }));
      // ローカル only データは保持しつつ、Worker由来データを上書き
      const localOnly=D.externalDocs.filter(d=>!d._fromWorker);
      D.externalDocs=[...localOnly,...apiDocs];
    }
  }catch(e){/* オフライン時はローカルのみ */}
  return getExtDocs(pt);
}

function hubExternalBox(pt){
  if(!D.externalDocs)D.externalDocs=[];
  const w=h('div');
  // 初回表示時に Worker から最新版を取得（重複呼び出し防止）
  if(!S._extDocsFetched)S._extDocsFetched={};
  if(!S._extDocsFetched[pt.id]){
    S._extDocsFetched[pt.id]=true;
    fetchExtDocsFromWorker(pt).then(()=>{rr()});
  }
  // 説明バナー
  w.appendChild(h('div',{style:{padding:'12px 14px',background:'#ecfeff',border:'1px solid #67e8f9',borderRadius:'10px',marginBottom:'16px',fontSize:'12px',color:'#0e7490',lineHeight:'1.7'}},
    h('div',{style:{fontWeight:'700',marginBottom:'4px'}},'外部連携BOX'),
    h('div',null,'病院・診療所・訪問看護・薬局・ケアマネ等から受領した医療文書を一元保管。電子署名＋タイムスタンプ付きで原本性を担保し、必要な多職種へ共有できます。')
  ));
  // 操作バー
  const bar=h('div',{style:{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}});
  bar.appendChild(btn('+ 文書をアップロード','btn-sm btn-pri',()=>showExternalDocUploadModal(pt)));
  bar.appendChild(btn('共有されたBOX（他組織から）','btn-sm btn-out',()=>showSharedWithMeModal()));
  w.appendChild(bar);
  // 一覧
  const docs=getExtDocs(pt).sort((a,b)=>(b.received_at||'').localeCompare(a.received_at||''));
  if(!docs.length){
    w.appendChild(h('div',{style:{textAlign:'center',padding:'40px 16px',color:'var(--ink-m)',background:'var(--surface)',borderRadius:'12px',border:'1px dashed var(--border)'}},
      h('div',{style:{fontSize:'13px',fontWeight:'600',marginBottom:'4px'}},'外部文書なし'),
      h('div',{style:{fontSize:'11px'}},'「+ 文書をアップロード」から、退院サマリ・看護指示書・診療情報提供書などを追加できます')));
    return w;
  }
  docs.forEach(d=>{
    const sigInfo=SIGNATURE_LEVELS[d.signature_level||'none']||SIGNATURE_LEVELS.none;
    const kindLabel=DOC_KIND_LABELS[d.doc_kind]||d.doc_kind;
    // 保存期限判定
    let retentionWarn=null;
    if(d.retention_until){
      const days=Math.floor((new Date(d.retention_until)-new Date())/(86400000));
      if(days<0)retentionWarn={t:'期限切れ',c:'#dc2626'};
      else if(days<30)retentionWarn={t:'残'+days+'日',c:'#dc2626'};
      else if(days<180)retentionWarn={t:'残'+days+'日',c:'#d97706'};
    }
    const card=h('div',{style:{padding:'14px 16px',background:'white',border:'1px solid var(--border)',borderRadius:'10px',marginBottom:'8px',cursor:'pointer'},onClick:()=>showExternalDocDetail(d,pt)});
    // ヘッダ行
    const hd=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px',flexWrap:'wrap'}});
    hd.appendChild(h('span',{style:{padding:'2px 8px',fontSize:'10px',fontWeight:'700',background:'var(--accent-l)',color:'var(--accent)',borderRadius:'10px'}},kindLabel));
    hd.appendChild(h('span',{style:{padding:'2px 8px',fontSize:'10px',fontWeight:'700',background:sigInfo.bg,color:sigInfo.c,borderRadius:'10px'}},sigInfo.l));
    if(d.version_no&&d.version_no>1)hd.appendChild(h('span',{style:{padding:'2px 8px',fontSize:'10px',fontWeight:'700',background:'#eff6ff',color:'#1d4ed8',borderRadius:'10px'}},'v'+d.version_no));
    if(retentionWarn)hd.appendChild(h('span',{style:{padding:'2px 8px',fontSize:'10px',fontWeight:'700',color:'white',background:retentionWarn.c,borderRadius:'10px'}},retentionWarn.t));
    if(d.share_count)hd.appendChild(h('span',{style:{padding:'2px 8px',fontSize:'10px',fontWeight:'700',background:'#f0fdf4',color:'#15803d',borderRadius:'10px'}},'共有 '+d.share_count));
    card.appendChild(hd);
    // タイトル行
    card.appendChild(h('div',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'4px'}},d.title||kindLabel));
    // メタ情報
    const meta=[];
    if(d.from_org_name)meta.push('発行: '+d.from_org_name);
    if(d.issued_date)meta.push('発行日: '+d.issued_date);
    if(d.received_at)meta.push('受領: '+d.received_at.slice(0,10));
    card.appendChild(h('div',{style:{fontSize:'11px',color:'var(--ink-m)'}},meta.join(' / ')));
    w.appendChild(card);
  });
  return w;
}

  ));

    items.forEach(it=>{
      const kindLabel=DOC_KIND_LABELS[it.doc_kind]||it.doc_kind;

      hd.appendChild(h('span',{style:{padding:'2px 8px',fontSize:'10px',fontWeight:'700',background:sigInfo.bg,color:sigInfo.c,borderRadius:'10px'}},sigInfo.l));
      if(it.acknowledged_at)hd.appendChild(h('span',{style:{padding:'2px 8px',fontSize:'10px',fontWeight:'700',background:'#dcfce7',color:'#15803d',borderRadius:'10px'}},'受領済'));
      else if(it.rejected_at)hd.appendChild(h('span',{style:{padding:'2px 8px',fontSize:'10px',fontWeight:'700',background:'#fee2e2',color:'#b91c1c',borderRadius:'10px'}},'差戻済'));
      else hd.appendChild(h('span',{style:{padding:'2px 8px',fontSize:'10px',fontWeight:'700',background:'#fef3c7',color:'#92400e',borderRadius:'10px'}},'未受領'));
      card.appendChild(hd);

      card.appendChild(h('div',{style:{fontSize:'10px',color:'var(--ink-m)',marginBottom:'8px'}},
        '共有日: '+(it.shared_at||'').slice(0,10)+(it.message?' / メッセージ: '+it.message:'')
      ));
      if(!it.acknowledged_at&&!it.rejected_at){

        actions.appendChild(btn('受領確認','btn-xs btn-pri',async()=>{
          try{
            const res=await api('/medical-docs/'+it.id+'/acknowledge',{method:'POST',body:JSON.stringify({})});
            if(res){toast('受領確認しました');S.modal=null;showSharedWithMeModal()}
          }catch(e){toast('受領確認に失敗');}
        }));
        actions.appendChild(btn('差戻し','btn-xs btn-danger',async()=>{
          const reason=prompt('差戻し理由（任意）','');

        card.appendChild(actions);
      }
      box.appendChild(card);

  })();

    // v22→v23: PC・モバイル統一でカードレイアウト＋⋮メニュー
    // 共通：actionBtns 構築関数
    const buildActionBtns=(st,sStatus,align)=>{
      const isSuspended=sStatus==='suspended';
      const isInactive=sStatus==='inactive';
      const wrap=h('div',{style:{display:'flex',gap:'6px',justifyContent:align||'center',flexWrap:'wrap'}});
      if(isInactive){
        wrap.appendChild(h('span',{style:{fontSize:'11px',color:'#9ca3af',padding:'6px 10px'}},'履歴のみ'));
        return wrap;
      }
      wrap.appendChild(btn(isSuspended?'復帰':'停止',isSuspended?'btn-sm btn-out':'btn-sm',async()=>{
        const newStatus=isSuspended?'active':'suspended';
        const confirmMsg=isSuspended?st.name+' を復帰させますか？':st.name+' を停止しますか？\n（ログイン不可・翌月分から課金停止）';
        if(!confirm(confirmMsg))return;
        const r2=await api('/staff/set-status',{method:'POST',body:JSON.stringify({staff_id:st.id,status:newStatus})});
        if(r2&&r2.success){S.inviteResult=null;toast(isSuspended?'復帰しました':'停止しました');rr();}else toast(r2?.error||'エラー');
      }));
      wrap.appendChild(btn('削除','btn-sm btn-danger',()=>showDeleteStaffModalM(st,rr)));
      wrap.appendChild(btn('PW再発行','btn-sm btn-out',async()=>{
        if(!confirm(st.name+'のパスワードを再発行しますか？'))return;
        const r2=await api('/staff/reset-password',{method:'POST',body:JSON.stringify({staff_id:st.id})});
        if(r2&&r2.success){
          const ov=document.createElement('div');
          ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999';
          const box=document.createElement('div');box.style.cssText='background:#fff;padding:28px;border-radius:16px;text-align:center;max-width:340px;width:90%';
          const t=document.createElement('div');t.style.cssText='font-size:15px;font-weight:800;color:#0891b2;margin-bottom:12px';t.textContent=r2.name+' のパスワードを再発行しました';box.appendChild(t);
          const idRow=document.createElement('div');idRow.style.cssText='background:#f0fdfa;border-radius:8px;padding:12px;margin-bottom:8px;font-size:12px;color:#64748b';
          idRow.textContent='ログインID: '+r2.login_id;box.appendChild(idRow);
          const pwRow=document.createElement('div');pwRow.style.cssText='background:#f0fdf4;border:2px solid #0891b2;border-radius:8px;padding:12px;margin-bottom:16px;text-align:center';
          const pwLabel=document.createElement('div');pwLabel.style.cssText='font-size:11px;color:#64748b;margin-bottom:4px';pwLabel.textContent='新しいパスワード';pwRow.appendChild(pwLabel);
          const pwVal=document.createElement('div');pwVal.style.cssText='font-size:24px;font-weight:900;color:#0891b2;letter-spacing:2px';pwVal.textContent=r2.new_password;pwRow.appendChild(pwVal);
          box.appendChild(pwRow);
          const noteEl=document.createElement('div');noteEl.style.cssText='font-size:11px;color:#94a3b8;margin-bottom:16px';noteEl.textContent='スタッフに伝えてください。次回ログイン時に変更を推奨します。';box.appendChild(noteEl);
          const btnCopy=document.createElement('button');btnCopy.textContent='コピー';btnCopy.style.cssText='padding:8px 16px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;margin-right:8px';
          btnCopy.onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(r2.new_password);};box.appendChild(btnCopy);
          const btnClose=document.createElement('button');btnClose.textContent='閉じる';btnClose.style.cssText='padding:8px 16px;border:none;border-radius:8px;background:#0891b2;color:#fff;cursor:pointer;font-weight:700;font-size:13px';
          btnClose.onclick=function(){ov.remove();};box.appendChild(btnClose);
          ov.appendChild(box);document.body.appendChild(ov);
        }else toast(r2?.error||'エラー');
      }));
      wrap.appendChild(btn('QR','btn-sm btn-out',async()=>{const r2=await api('/staff/qr',{method:'POST',body:JSON.stringify({staff_id:st.id})});if(r2&&r2.qr_url){S.qrModal={name:st.name,url:r2.qr_url,token:r2.qr_token};showQRModal(S.qrModal);}else toast(r2?.error||'エラー');}));
      return wrap;
    };
    // 状態バッジ生成
    const buildBadge=(st,sStatus)=>{
      const isSuspended=sStatus==='suspended';
      const isInactive=sStatus==='inactive';
      const bg=isInactive?'#e5e7eb':isSuspended?'#fee2e2':st.email_verified?'#dcfce7':'#fef9c3';
      const fg=isInactive?'#6b7280':isSuspended?'#dc2626':st.email_verified?'#16a34a':'#ca8a04';
      const lab=isInactive?'退職済み':isSuspended?'停止中':st.email_verified?'有効':'未認証';
      return h('span',{style:{display:'inline-block',padding:'3px 12px',borderRadius:'100px',fontSize:'11px',fontWeight:'700',background:bg,color:fg,whiteSpace:'nowrap'}},lab);
    };
    // === カードレイアウト（PC・モバイル統一）＋⋮メニュー ===
    const cardList=h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}});
    res.staff.forEach(st=>{
      const sStatus=getStatus(st);
      const isInactive=sStatus==='inactive';
      const opacity=isInactive?'0.5':sStatus==='suspended'?'0.75':'1';
      const card=h('div',{style:{border:'1px solid var(--border)',borderRadius:'12px',padding:'14px 14px 12px',background:'#fff',opacity,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}});
      // 上段：ID + バッジ + ⋮メニュー
      const top=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'8px',marginBottom:'6px'}});
      top.appendChild(h('div',{style:{fontFamily:'monospace',fontWeight:'700',color:'var(--accent)',fontSize:'13px',letterSpacing:'1px',wordBreak:'break-all',flex:'1'}},st.login_id||'—'));
      top.appendChild(buildBadge(st,sStatus));
      // ⋮メニュー → 編集ボタン（ｔと同等仕様：編集モーダル集約）
      const editBtn=isInactive
        ? h('button',{style:{border:'1px solid var(--border)',background:'#fff',color:'#64748b',cursor:'pointer',padding:'6px 14px',fontSize:'12px',fontWeight:'600',borderRadius:'6px'},onClick:()=>showStaffEditModal(st,sStatus,buildActionBtns,rr)},'編集')
        : h('button',{style:{border:'1px solid var(--accent)',background:'#fff',color:'var(--accent)',cursor:'pointer',padding:'6px 14px',fontSize:'12px',fontWeight:'700',borderRadius:'6px'},onClick:()=>showStaffEditModal(st,sStatus,buildActionBtns,rr)},'編集');
      top.appendChild(editBtn);
      card.appendChild(top);
      // 名前
      card.appendChild(h('div',{style:{fontWeight:'700',fontSize:'15px',marginBottom:'2px'}},st.name));
      // メール
      card.appendChild(h('div',{style:{fontSize:'12px',color:'var(--ink-m)',wordBreak:'break-all'}},st.email||'—'));
      // 退職済みのみ「履歴のみ」表示
      if(isInactive){
        card.appendChild(h('div',{style:{fontSize:'11px',color:'#9ca3af',marginTop:'8px',fontStyle:'italic'}},'履歴のみ・操作不可'));
      }
      cardList.appendChild(card);
    });
    listContent.appendChild(cardList);
    // v22: アクティブ人数（status='active' のみ）でカウント
    const activeCnt=res.staff.filter(s=>getStatus(s)==='active').length;
    listContent.appendChild(h('div',{style:{marginTop:'12px',fontSize:'12px',color:'var(--ink-m)'}},res.staff.length+'名のスタッフ ／ 月額 ¥'+(activeCnt*200).toLocaleString()+'（アクティブ '+activeCnt+'名×¥200）'));
  });
  return w;
}

// v23: 編集モーダル（ｔやるゼ！と同等仕様：在籍状況切替・退職処理・PW再発行・QRを集約）
function showStaffEditModal(st,sStatus,buildActionBtns,refresh){
  const isInactive=sStatus==='inactive';
  const isSuspended=sStatus==='suspended';
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px';
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  const box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:14px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.2)';
  // ヘッダ
  const header=document.createElement('div');header.style.cssText='padding:20px 22px 16px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center';
  const title=document.createElement('div');title.style.cssText='font-size:17px;font-weight:800;color:#111';title.textContent='スタッフ編集';header.appendChild(title);
  const closeBtn=document.createElement('button');closeBtn.textContent='×';closeBtn.style.cssText='border:none;background:transparent;font-size:24px;cursor:pointer;color:#64748b;padding:0 4px;line-height:1';closeBtn.onclick=()=>ov.remove();header.appendChild(closeBtn);
  box.appendChild(header);
  // 本体
  const body=document.createElement('div');body.style.cssText='padding:18px 22px';
  // 基本情報（読み取り専用）
  const infoLabel=(label,val)=>{
    const w=document.createElement('div');w.style.cssText='margin-bottom:14px';
    const l=document.createElement('div');l.style.cssText='font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px';l.textContent=label;w.appendChild(l);
    const v=document.createElement('div');v.style.cssText='font-size:14px;color:#111;font-weight:500;word-break:break-all';v.textContent=val||'—';w.appendChild(v);
    return w;
  };
  body.appendChild(infoLabel('ログインID',st.login_id));
  body.appendChild(infoLabel('名前',st.name));
  body.appendChild(infoLabel('メール',st.email));
  // 退職バナー（inactive のみ）
  if(isInactive){
    const banner=document.createElement('div');banner.style.cssText='padding:14px 16px;background:#f9fafb;border:1px solid #d1d5db;border-radius:8px;margin-bottom:16px';
    const bTitle=document.createElement('div');bTitle.style.cssText='font-size:13px;font-weight:700;color:#6b7280;margin-bottom:4px';bTitle.textContent='⚠ このスタッフは退職処理済みです';banner.appendChild(bTitle);
    const bDetail=document.createElement('div');bDetail.style.cssText='font-size:12px;color:#6b7280;line-height:1.6';
    const blockedAt=st.access_blocked_at?new Date(st.access_blocked_at).toLocaleString('ja-JP'):'—';
    bDetail.textContent='利用停止日時: '+blockedAt;banner.appendChild(bDetail);
    const reactBtn=document.createElement('button');reactBtn.textContent='在籍中に戻す（再雇用）';reactBtn.style.cssText='margin-top:10px;padding:8px 16px;background:#16a34a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600';
    reactBtn.onclick=async()=>{
      if(!confirm(st.name+' を在籍中に戻しますか？'))return;
      reactBtn.disabled=true;reactBtn.textContent='処理中...';
      const r2=await api('/staff/set-status',{method:'POST',body:JSON.stringify({staff_id:st.id,status:'active'})});
      if(r2&&r2.success){toast('在籍中に戻しました');ov.remove();if(refresh)refresh();}
      else{reactBtn.disabled=false;reactBtn.textContent='在籍中に戻す（再雇用）';toast(r2?.error||'エラー');}
    };
    banner.appendChild(reactBtn);
    body.appendChild(banner);
  } else {
    // 在籍状況2択ラジオ（active のみで操作可）
    const statusGroup=document.createElement('div');statusGroup.style.cssText='margin-bottom:16px';
    const sLabel=document.createElement('div');sLabel.style.cssText='font-size:13px;font-weight:700;color:#111;margin-bottom:8px';sLabel.textContent='在籍状況';statusGroup.appendChild(sLabel);
    const radioWrap=document.createElement('div');radioWrap.style.cssText='display:flex;gap:8px';
    const mkRadio=(value,label,checked)=>{
      const lab=document.createElement('label');lab.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:2px solid '+(checked?'#0891b2':'#e5e7eb')+';border-radius:8px;cursor:pointer;background:'+(checked?'#f0fdfa':'#fff')+';font-size:13px;font-weight:600';
      const r=document.createElement('input');r.type='radio';r.name='edit_status';r.value=value;if(checked)r.checked=true;
      r.addEventListener('change',()=>{
        Array.from(radioWrap.querySelectorAll('label')).forEach(l=>{l.style.borderColor='#e5e7eb';l.style.background='#fff'});
        lab.style.borderColor='#0891b2';lab.style.background='#f0fdfa';
        suspendedHint.style.display=value==='suspended'?'block':'none';
      });
      lab.appendChild(r);lab.appendChild(document.createTextNode(label));
      return lab;
    };
    radioWrap.appendChild(mkRadio('active','在籍中',!isSuspended));
    radioWrap.appendChild(mkRadio('suspended','停止中（休職）',isSuspended));
    statusGroup.appendChild(radioWrap);
    const suspendedHint=document.createElement('div');suspendedHint.style.cssText='display:'+(isSuspended?'block':'none')+';margin-top:8px;padding:8px 12px;background:#fef2f2;border-left:3px solid #dc2626;border-radius:4px;font-size:12px;color:#991b1b';suspendedHint.textContent='※ 即時ログイン不可になります。翌月分から課金対象外。「在籍中」に戻せば復帰可能です。';statusGroup.appendChild(suspendedHint);
    body.appendChild(statusGroup);
    // 削除（退職処理）ボタン
    const delWrap=document.createElement('div');delWrap.style.cssText='margin-bottom:16px';
    const delBtn=document.createElement('button');delBtn.textContent='🗑 削除（退職処理）';delBtn.style.cssText='width:100%;padding:12px 16px;background:#fff;color:#dc2626;border:1.5px solid #dc2626;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600';
    delBtn.onclick=()=>{ov.remove();showDeleteStaffModalM(st,refresh);};
    delWrap.appendChild(delBtn);
    const delNote=document.createElement('div');delNote.style.cssText='color:#6b7280;font-size:11px;margin-top:6px';delNote.textContent='※退職時の処理。アクセス制御は次の画面で選択します。';delWrap.appendChild(delNote);
    body.appendChild(delWrap);
    // PW再発行・QR（横並び）
    const auxWrap=document.createElement('div');auxWrap.style.cssText='display:flex;gap:8px;margin-bottom:8px';
    const sourceBtns=buildActionBtns(st,sStatus,'center');
    const realBtns=Array.from(sourceBtns.querySelectorAll('button'));
    // realBtns: [0]停止/復帰, [1]削除, [2]PW再発行, [3]QR
    const pwBtn=document.createElement('button');pwBtn.textContent='パスワード再発行';pwBtn.style.cssText='flex:1;padding:10px;background:#fff;color:#0891b2;border:1px solid #0891b2;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600';pwBtn.onclick=()=>{if(realBtns[2])realBtns[2].click();};
    const qrBtn=document.createElement('button');qrBtn.textContent='QRコード表示';qrBtn.style.cssText='flex:1;padding:10px;background:#fff;color:#0891b2;border:1px solid #0891b2;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600';qrBtn.onclick=()=>{if(realBtns[3])realBtns[3].click();};
    auxWrap.appendChild(pwBtn);auxWrap.appendChild(qrBtn);
    body.appendChild(auxWrap);
  }
  box.appendChild(body);
  // フッター（保存・キャンセル）
  const footer=document.createElement('div');footer.style.cssText='padding:14px 22px 18px;border-top:1px solid #f1f5f9;display:flex;gap:8px;justify-content:flex-end';
  const cancelBtn=document.createElement('button');cancelBtn.textContent=isInactive?'閉じる':'キャンセル';cancelBtn.style.cssText='padding:10px 18px;border:1px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:600';cancelBtn.onclick=()=>ov.remove();
  footer.appendChild(cancelBtn);
  if(!isInactive){
    const saveBtn=document.createElement('button');saveBtn.textContent='保存';saveBtn.style.cssText='padding:10px 22px;border:none;border-radius:8px;background:#0891b2;color:#fff;cursor:pointer;font-weight:700;font-size:13px';
    saveBtn.onclick=async()=>{
      const newStatus=box.querySelector('input[name=edit_status]:checked')?.value||'active';
      if(newStatus===sStatus){ov.remove();return;}
      saveBtn.disabled=true;saveBtn.textContent='保存中...';
      const r2=await api('/staff/set-status',{method:'POST',body:JSON.stringify({staff_id:st.id,status:newStatus})});
      if(r2&&r2.success){toast(newStatus==='suspended'?'停止しました':'在籍中に戻しました');ov.remove();if(refresh)refresh();}
      else{saveBtn.disabled=false;saveBtn.textContent='保存';toast(r2?.error||'エラー');}
    };
    footer.appendChild(saveBtn);
  }
  box.appendChild(footer);
  ov.appendChild(box);document.body.appendChild(ov);
}

// v22→: モバイル用アクションシート（⋮メニュー → ボトムシート風モーダル）
function showStaffActionSheet(st,sStatus,buildActionBtns){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:9999;animation:fadeIn .15s ease-out';
  // 背景クリックで閉じる
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  const sheet=document.createElement('div');
  sheet.style.cssText='background:#fff;width:100%;max-width:560px;border-radius:16px 16px 0 0;padding:8px 0 24px;box-shadow:0 -4px 20px rgba(0,0,0,0.15);animation:slideUp .2s ease-out';
  // ハンドル
  const handle=document.createElement('div');handle.style.cssText='width:40px;height:4px;background:#d1d5db;border-radius:2px;margin:8px auto 12px';sheet.appendChild(handle);
  // ヘッダ：氏名
  const head=document.createElement('div');head.style.cssText='padding:4px 20px 14px;border-bottom:1px solid #f1f5f9';
  const headName=document.createElement('div');headName.style.cssText='font-size:16px;font-weight:800;color:#111';headName.textContent=st.name;head.appendChild(headName);
  const headSub=document.createElement('div');headSub.style.cssText='font-size:12px;color:#64748b;margin-top:2px;font-family:monospace';headSub.textContent=st.login_id||'—';head.appendChild(headSub);
  sheet.appendChild(head);
  // アクション項目（buildActionBtnsから取り出してリスト化）
  const isSuspended=sStatus==='suspended';
  const items=[
    {label:isSuspended?'復帰させる':'停止する',idx:0},
    {label:'削除（退職処理）',idx:1,danger:true},
    {label:'パスワード再発行',idx:2},
    {label:'QRコード表示',idx:3}
  ];
  // 内部buildActionBtnsから本来のボタン群を取り出してclickをハイジャック
  const sourceBtns=buildActionBtns(st,sStatus,'center');
  const realBtns=Array.from(sourceBtns.querySelectorAll('button'));
  items.forEach(it=>{
    const row=document.createElement('div');
    row.style.cssText='padding:16px 20px;display:flex;align-items:center;cursor:pointer;border-bottom:1px solid #f1f5f9;transition:background .15s';
    row.addEventListener('touchstart',()=>{row.style.background='#f8fafc'});
    row.addEventListener('touchend',()=>{row.style.background='#fff'});
    row.addEventListener('mouseenter',()=>{row.style.background='#f8fafc'});
    row.addEventListener('mouseleave',()=>{row.style.background='#fff'});
    const labelEl=document.createElement('div');labelEl.style.cssText='font-size:15px;font-weight:600;color:'+(it.danger?'#dc2626':'#111');labelEl.textContent=it.label;row.appendChild(labelEl);
    row.onclick=()=>{
      ov.remove();
      // 元のボタンクリックを実行
      if(realBtns[it.idx])realBtns[it.idx].click();
    };
    sheet.appendChild(row);
  });
  // キャンセル
  const cancel=document.createElement('div');
  cancel.style.cssText='padding:16px 20px;text-align:center;font-size:14px;color:#64748b;cursor:pointer;font-weight:600;margin-top:6px';
  cancel.textContent='キャンセル';
  cancel.onclick=()=>ov.remove();
  sheet.appendChild(cancel);
  ov.appendChild(sheet);
  document.body.appendChild(ov);
  // アニメーションキーフレーム（初回のみ）
  if(!document.getElementById('staff-sheet-anim')){
    const styleEl=document.createElement('style');styleEl.id='staff-sheet-anim';
    styleEl.textContent='@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}';
    document.head.appendChild(styleEl);
  }
}

  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999';

  const sub=document.createElement('div');sub.style.cssText='font-size:13px;color:#374151;margin-bottom:16px';sub.innerHTML=st.name+' さんを退職処理します。<br>翌月分から課金対象外となります（返金なし）。';box.appendChild(sub);
  const note=document.createElement('div');note.style.cssText='font-size:12px;color:#6b7280;margin-bottom:14px';note.textContent='アクセス制御を選択してください：';box.appendChild(note);

  const radioWrap=document.createElement('div');radioWrap.style.cssText='display:flex;flex-direction:column;gap:10px;margin-bottom:16px';
  // 日付ピッカー（block_until 選択時のみ表示）

// === QR SCAN LOGIN（ログイン画面のカメラスキャナ）===
var qrScanState={stream:null,interval:null,canvas:null,ctx:null};
async function startQRScanLogin(){
  var ov=document.createElement('div');
  ov.id='qr-scan-overlay';
  ov.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
  var title=document.createElement('div');
  title.textContent='QRコードをかざしてください';
  title.style.cssText='color:#fff;font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;';
  ov.appendChild(title);
  var frame=document.createElement('div');
  frame.style.cssText='position:relative;width:280px;height:280px;border:3px solid #0891b2;border-radius:12px;overflow:hidden;background:#000;';
  var video=document.createElement('video');
  video.autoplay=true;video.playsInline=true;video.muted=true;
  video.setAttribute('playsinline','');
  video.style.cssText='width:100%;height:100%;object-fit:cover;';
  frame.appendChild(video);
  var line=document.createElement('div');
  line.style.cssText='position:absolute;top:50%;left:0;right:0;height:2px;background:#0891b2;box-shadow:0 0 8px #0891b2;animation:qrline 2s ease-in-out infinite alternate;';
  frame.appendChild(line);
  ov.appendChild(frame);
  var hint=document.createElement('div');
  hint.textContent='管理者から発行された社員QRをかざしてください';
  hint.style.cssText='color:#bbb;font-size:12px;margin-top:14px;text-align:center;';
  ov.appendChild(hint);
  var cancel=document.createElement('button');
  cancel.textContent='キャンセル';
  cancel.style.cssText='margin-top:24px;padding:12px 32px;background:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;color:#111;';
  cancel.onclick=stopQRScanLogin;
  ov.appendChild(cancel);
  if(!document.getElementById('qr-scan-style')){
    var st=document.createElement('style');st.id='qr-scan-style';
    st.textContent='@keyframes qrline{0%{top:8%}100%{top:92%}}';
    document.head.appendChild(st);
  }
  document.body.appendChild(ov);
  try{
    qrScanState.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject=qrScanState.stream;
    await video.play();
    qrScanState.canvas=document.createElement('canvas');
    qrScanState.ctx=qrScanState.canvas.getContext('2d');
    qrScanState.interval=setInterval(function(){scanQRFrame(video);},300);
  }catch(e){
    stopQRScanLogin();
    toast('カメラアクセスが許可されていません');
  }
}
function stopQRScanLogin(){
  if(qrScanState.stream){qrScanState.stream.getTracks().forEach(function(t){t.stop();});qrScanState.stream=null;}
  if(qrScanState.interval){clearInterval(qrScanState.interval);qrScanState.interval=null;}
  var ov=document.getElementById('qr-scan-overlay');
  if(ov)ov.remove();
}
function scanQRFrame(video){
  if(video.readyState!==video.HAVE_ENOUGH_DATA)return;
  var c=qrScanState.canvas,ctx=qrScanState.ctx;
  c.width=video.videoWidth;c.height=video.videoHeight;
  ctx.drawImage(video,0,0);
  try{
    if(window.BarcodeDetector){
      new BarcodeDetector({formats:['qr_code']}).detect(c).then(function(codes){
        if(codes&&codes.length>0)handleQRScanResult(codes[0].rawValue);
      }).catch(function(){});
      return;
    }
    if(typeof jsQR!=='undefined'){
      var imgData=ctx.getImageData(0,0,c.width,c.height);
      var code=jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'dontInvert'});
      if(code)handleQRScanResult(code.data);
    }
  }catch(e){}
}
async function handleQRScanResult(qrText){
  stopQRScanLogin();
  var token=null;
  try{
    var u=new URL(qrText);
    token=u.searchParams.get('qr')||u.searchParams.get('qr_token');
  }catch(e){}
  if(!token){toast('このQRコードはｍやるゼ！用ではありません');return;}
  try{
    var res=await api('/auth/qr-login',{method:'POST',body:JSON.stringify({qr_token:token})});
    if(res&&res.token){
      saveToken(res.token);S.user=res.user;
      await loadFromCloud();
      try{await checkModuleAccess();}catch(e){}
      try{startNotifPolling();}catch(e){}
      S.scr='app';S.page='patients';S.loginErr='';rr();
      toast(res.user.name+'さん、ログインしました');
    }else{
      toast((res&&res.error)||'QRコードが無効または期限切れです');
    }
  }catch(e){toast('通信エラーが発生しました');}
}

// ③ 紙締結済み記録モーダル
function showNdaPaperModal(){
  const modal=h('div',{className:'modal',style:{maxWidth:'520px'}});

  let fileData='', fileType='', fileName='';
  const filePreview=h('div',{style:{fontSize:'11px',color:'var(--ink-l)',marginTop:'4px'}});

  modal.appendChild(h('div',{style:{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'12px'}},
    h('div',null,
      h('div',{style:{fontSize:'12px',fontWeight:'700',marginBottom:'4px'}},'相手法人のログインID'),
      h('input',{id:'nda_paper_partner',type:'text',placeholder:'ADM-XXXXXX',style:{width:'100%',padding:'8px 10px',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'13px',boxSizing:'border-box'}})
    ),
    h('div',null,
      h('div',{style:{fontSize:'12px',fontWeight:'700',marginBottom:'4px'}},'締結日'),
      h('input',{id:'nda_paper_date',type:'date',style:{width:'100%',padding:'8px 10px',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'13px',boxSizing:'border-box'}})
    ),
    h('div',null,
      h('div',{style:{fontSize:'12px',fontWeight:'700',marginBottom:'4px'}},'原本ファイル（PDF・写真）'),
      h('input',{type:'file',accept:'application/pdf,image/*',style:{width:'100%',fontSize:'12px'},
        onChange:e=>{
          const file=e.target.files[0];
          if(!file)return;
          if(file.size>3*1024*1024){toast('3MB以下のファイルを選択してください');e.target.value='';return;}
          fileName=file.name; fileType=file.type;
          const reader=new FileReader();
          reader.onload=ev=>{
            fileData=ev.target.result.split(',')[1];
            filePreview.textContent='選択: '+fileName+' ('+Math.round(file.size/1024)+'KB)';
            filePreview.style.color='var(--accent)';
          };
          reader.readAsDataURL(file);
        }
      }),
      filePreview
    ),
    h('div',null,
      h('div',{style:{fontSize:'12px',fontWeight:'700',marginBottom:'4px'}},'メモ（任意）'),
      h('textarea',{id:'nda_paper_note',placeholder:'例：郵送にて締結。原本はファイルNo.12に保管。',
        style:{width:'100%',height:'60px',padding:'8px 10px',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'12px',resize:'none',boxSizing:'border-box'}})
    )
  ));

  modal.appendChild(h('div',{style:{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'8px',padding:'10px 12px',fontSize:'11px',color:'#15803d',marginBottom:'12px',lineHeight:'1.7'}},
    '記録後は「締結済み」として扱われ、退院通知の送受信が可能になります。ファイルはサーバーに保存されます（3MB以下）。'
  ));

  modal.appendChild(h('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}},
    btn('← 戻る','btn-sec',()=>{showNdaRequestModal()}),
    btn('紙締結として記録する','btn-pri',async()=>{
      const pid=document.getElementById('nda_paper_partner')?.value?.trim();
      const date=document.getElementById('nda_paper_date')?.value;
      const note=document.getElementById('nda_paper_note')?.value?.trim();
      if(!pid){toast('ログインIDを入力してください');return;}
      if(!date){toast('締結日を入力してください');return;}
      const res=await api('/nda/request',{method:'POST',body:JSON.stringify({
        partner_login_id:pid,nda_type:'paper',paper_signed_at:date,paper_note:note||'',
        paper_file_data:fileData,paper_file_type:fileType
      })});
      if(res?.success){S.modal=null;S.ndaList=null;toast(res.message);rr();}
      else toast(res?.error||'エラー');
    })
  ));
  S.modal=modal;rr();
}

  // NDA全文表示（自社書式があればそちらを優先）
  const ndaDisplayText = nda.custom_text || NDA_TEXT;
  const ndaTypeLabel = nda.nda_type==='custom' ? '（自社書式）' : nda.nda_type==='paper' ? '（紙締結済み）' : '（ｍやるゼ！標準書式）';

    h('div',{style:{fontWeight:'700',marginBottom:'10px'}},'署名者情報'),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'8px'}},
      h('div',null,
        h('div',{style:{fontSize:'11px',color:'var(--ink-l)',marginBottom:'3px'}},'署名者氏名 *'),
        h('input',{id:'nda_signer_name',type:'text',placeholder:'例：山田 太郎',style:{width:'100%',padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'6px',fontSize:'12px',boxSizing:'border-box'}})
      ),
      h('div',null,
        h('div',{style:{fontSize:'11px',color:'var(--ink-l)',marginBottom:'3px'}},'役職'),
        h('input',{id:'nda_signer_role',type:'text',placeholder:'例：代表取締役・管理者',style:{width:'100%',padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'6px',fontSize:'12px',boxSizing:'border-box'}})

      h('div',null,'法人名：'+(S.user?.org||'')),
      h('div',null,'ログインID：'+(S.user?.login_id||'')),

    )
  ));

  // 本人確認：パスワード再入力
  modal.appendChild(h('div',{style:{borderTop:'1px solid var(--border)',paddingTop:'12px',marginBottom:'8px'}},
    h('div',{style:{fontSize:'13px',fontWeight:'700',marginBottom:'6px'}},'本人確認'),
    h('div',{style:{fontSize:'12px',color:'var(--ink-m)',marginBottom:'8px'}},'電子署名として有効にするため、現在のパスワードを入力してください。'),
    h('div',{style:{position:'relative'}},
      h('input',{id:'nda_sign_pw',type:'password',placeholder:'現在のパスワード',style:{width:'100%',padding:'8px 10px',paddingRight:'44px',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'13px',boxSizing:'border-box'}}),
      h('button',{type:'button',style:{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:'13px',color:'var(--ink-m)',fontFamily:'inherit'},
        onClick:()=>{const i=document.getElementById('nda_sign_pw');if(i)i.type=i.type==='password'?'text':'password';}},'表示')
    )
  ));

  modal.appendChild(h('div',{style:{background:'#fff2f0',border:'1px solid #fecaca',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#991b1b',marginBottom:'12px'}},'署名すると本契約の内容に法的に拘束されます。内容を十分にご確認の上、署名してください。'));

  modal.appendChild(h('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}},
    btn('キャンセル','btn-sec',()=>{S.modal=null;rr()}),
    btn('上記内容に同意して電子署名する','btn-pri',async()=>{
      const pw=document.getElementById('nda_sign_pw')?.value?.trim();
      const sname=document.getElementById('nda_signer_name')?.value?.trim();
      const srole=document.getElementById('nda_signer_role')?.value?.trim();
      if(!sname){toast('署名者氏名を入力してください');return;}
      if(!pw){toast('パスワードを入力してください');return;}
      const res=await api('/nda/sign',{method:'POST',body:JSON.stringify({nda_id:nda.id,password:pw,signer_name:sname,signer_role:srole||''})});
      if(res?.success){
        // v13: NDA を共通改ざん防止基盤へ自動 finalize
        try{
          await api('/signed-docs/finalize',{method:'POST',body:JSON.stringify({
            doc_kind:'org_nda',
            doc_id:nda.id,
            title:'NDA: '+(nda.partner_org_name||nda.id),
            content:{nda_id:nda.id,signer_name:sname,signer_role:srole||'',signed_at:new Date().toISOString(),nda_type:nda.nda_type||'standard'},
            patient_id:null
          })}).catch(e=>console.warn('NDA signed-docs finalize skipped:',e?.message||e));
        }catch(e){console.warn('NDA finalize error:',e);}
        S.modal=null;S.ndaList=null;toast(res.message+'（改ざん防止登録済）');rr();
      }
      else toast(res?.error||'署名に失敗しました');
    })
  ));
  S.modal=modal;rr();
}

  if(c.needPw){
    modal.appendChild(h('div',{style:{marginBottom:'12px',marginTop:'10px'}},
      h('div',{style:{fontSize:'12px',fontWeight:'700',marginBottom:'4px'}},'パスワード確認'),
      h('div',{style:{position:'relative'}},
        h('input',{id:'nda_action_pw',type:'password',placeholder:'現在のパスワード',
          style:{width:'100%',padding:'8px 10px',paddingRight:'44px',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'13px',boxSizing:'border-box'}}),
        h('button',{type:'button',style:{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:'13px',color:'var(--ink-m)'},
          onClick:()=>{const i=document.getElementById('nda_action_pw');if(i)i.type=i.type==='password'?'text':'password';}},'表示')
      )
    ));
  }
  modal.appendChild(h('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}},
    btn('キャンセル','btn-sec',()=>{S.modal=null;rr()}),
    btn(c.btn,'btn-pri '+c.btnClass,async()=>{
      const pw=c.needPw?document.getElementById('nda_action_pw')?.value?.trim():null;
      if(c.needPw&&!pw){toast('パスワードを入力してください');return;}
      let res;
      if(action==='delete') res=await api('/nda/'+nda.id,{method:'DELETE',body:JSON.stringify({password:pw})});
      else if(action==='terminate') res=await api('/nda/'+nda.id+'/terminate',{method:'POST',body:JSON.stringify({password:pw})});
      else if(action==='withdraw') res=await api('/nda/'+nda.id+'/withdraw',{method:'POST',body:JSON.stringify({})});
      if(res?.success){S.modal=null;S.ndaList=null;toast(res.message);rr();}
      else toast(res?.error||'エラーが発生しました');
    })
  ));
  S.modal=modal;rr();
}

  presetRow.appendChild(presetSel);
  periodWrap.appendChild(presetRow);

  // カスタム期間入力（プリセット選択時は非表示）

  customRow.appendChild(h('label',{style:{fontSize:'12px',color:'#475569'}},'開始日:'));
  const startInp=h('input',{type:'date',id:'cf-period-start',style:{padding:'6px',borderRadius:'4px',border:'1px solid #d1d5db',fontSize:'13px'}});
  customRow.appendChild(startInp);
  customRow.appendChild(h('span',{style:{color:'#64748b',fontSize:'13px'}},'～'));
  customRow.appendChild(h('label',{style:{fontSize:'12px',color:'#475569'}},'終了日:'));
  const endInp=h('input',{type:'date',id:'cf-period-end',style:{padding:'6px',borderRadius:'4px',border:'1px solid #d1d5db',fontSize:'13px'}});
  customRow.appendChild(endInp);
  periodWrap.appendChild(customRow);

  // プリセット切替時の表示制御
  presetSel.addEventListener('change',()=>{
    if(presetSel.value==='custom'){
      customRow.style.display='flex';
      // 初期値: 同意日 → 同意日+6か月
      const cfDate=document.getElementById('cf-date');
      if(cfDate && cfDate.value && !startInp.value){
        startInp.value=cfDate.value;
        const d=new Date(cfDate.value);
        d.setMonth(d.getMonth()+6);
        endInp.value=d.toISOString().slice(0,10);
      }

      customRow.style.display='none';
    }
  });

  // 互換用の隠しフィールド（既存処理で months を参照しているため）
  const monthsHidden=h('input',{type:'hidden',id:'cf-months',value:'6'});
  periodWrap.appendChild(monthsHidden);

  // プリセット値変更を hidden に反映
  presetSel.addEventListener('change',()=>{
    if(presetSel.value!=='custom'){
      monthsHidden.value=presetSel.value;
    } else {
      monthsHidden.value='custom';
    }
  });

  form.appendChild(periodWrap);

  // 傷病名（JSON テキストエリア・簡易版）
  const dWrap=h('div');
  dWrap.appendChild(h('label',{style:{display:'block',fontSize:'12px',fontWeight:'700',marginBottom:'4px'}},'傷病名（1行1疾病・「疾病名:発症日YYYY-MM-DD」形式）*'));
  const dInp=h('textarea',{id:'cf-diseases',rows:4,placeholder:'変形性膝関節症（両）:2023-04-01\n腰痛症:2024-06-15',style:{width:'100%',padding:'8px',borderRadius:'4px',border:'1px solid #d1d5db',fontSize:'13px'}});
  dWrap.appendChild(dInp);
  form.appendChild(dWrap);

  // 通院困難理由（簡易チェックボックス）
  const drWrap=h('div',{style:{padding:'12px',background:'#f9fafb',borderRadius:'4px',border:'1px solid #e5e7eb'}});
  drWrap.appendChild(h('label',{style:{display:'block',fontSize:'12px',fontWeight:'700',marginBottom:'8px'}},'通院困難理由（チェック）'));
  const reasons=['肩関節周囲炎','変形性膝関節症','腰痛症','変形性腰椎症','脊柱管狭窄症','関節リウマチ','脳梗塞・脳梗塞後遺症','脳出血・脳出血後遺症','麻痺','神経痛','パーキンソン','その他'];
  reasons.forEach((r,i)=>{
    const lbl=h('label',{style:{display:'inline-block',marginRight:'12px',marginBottom:'4px',fontSize:'13px',cursor:'pointer'}});
    const cb=h('input',{type:'checkbox',className:'cf-reason',value:r,style:{marginRight:'4px'}});
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(r));
    drWrap.appendChild(lbl);
  });
  form.appendChild(drWrap);

  // 算定設定
  const claimWrap=h('div',{style:{padding:'12px',background:'#fef3c7',borderRadius:'4px',border:'1px solid #fbbf24'}});
  claimWrap.appendChild(h('label',{style:{display:'block',fontSize:'12px',fontWeight:'700',marginBottom:'4px'}},'保険算定（療養費同意書交付料 B013）'));
  const claimCb=h('input',{type:'checkbox',id:'cf-claim',checked:true,style:{marginRight:'6px'}});
  const claimLbl=h('label',{style:{fontSize:'13px',cursor:'pointer'}});
  claimLbl.appendChild(claimCb);
  claimLbl.appendChild(document.createTextNode('療養費同意書交付料 100点 を算定対象として登録する'));
  claimWrap.appendChild(claimLbl);
  form.appendChild(claimWrap);

  // 発行ボタン
  const submitBtn=btn('発行する（医師署名へ進む）','btn-pri',async ()=>{
    const pt=document.getElementById('cf-patient').value;
    if(!pt){toast('患者を選択してください');return;}
    const ctype=document.getElementById('cf-type').value;
    const dRaw=document.getElementById('cf-diseases').value.trim();
    // v5.0.5: request_form（訪問診療同意書/依頼書）の場合は傷病名を任意に
    if(ctype!=='request_form' && !dRaw){toast('傷病名を1つ以上入力してください');return;}
    const diseases= dRaw ? dRaw.split('\n').filter(l=>l.trim()).map(l=>{
      const m=l.split(':');
      return {name:(m[0]||'').trim(),onset_date:(m[1]||'').trim()||null};
    }) : [];
    const reasonChecks=document.querySelectorAll('.cf-reason:checked');
    const drJson={};
    reasonChecks.forEach(cb=>{drJson[cb.value]=true});
    const body={
      patient_id:pt,
      consent_type:ctype,
      disease_names:diseases,
      consent_date:document.getElementById('cf-date').value,
      validity_months:(function(){
        // v5.0: プリセット選択時は数値、カスタム期間時は開始日〜終了日の月数を整数で算出
        const preset=document.getElementById('cf-period-preset');
        if(preset && preset.value==='custom'){
          const s=document.getElementById('cf-period-start').value;
          const e=document.getElementById('cf-period-end').value;
          if(s && e){
            const sd=new Date(s),ed=new Date(e);
            if(ed>=sd){
              // 月数換算（小数点切り上げ・ハッシュ整合のため整数化）
              const months=(ed.getFullYear()-sd.getFullYear())*12+(ed.getMonth()-sd.getMonth())+(ed.getDate()>=sd.getDate()?0:0);
              return Math.max(1, months || 1);
            }
          }
          return 6; // fallback
        }
        return Number(document.getElementById('cf-months').value)||6;
      })(),
      // カスタム期間時のみ、開始日・終了日を補足情報として送付（Worker は未使用でもOK）
      valid_from:(function(){
        const preset=document.getElementById('cf-period-preset');
        if(preset && preset.value==='custom') return document.getElementById('cf-period-start').value||null;
        return null;
      })(),
      valid_until:(function(){
        const preset=document.getElementById('cf-period-preset');
        if(preset && preset.value==='custom') return document.getElementById('cf-period-end').value||null;
        return null;
      })(),
      difficulty_reasons:drJson,
      treatment_plan:{
        visit_frequency:'biannual',
        evaluation_frequency:'monthly',
        goals:'',
        treatment_method:''
      }
    };
    submitBtn.disabled=true;
    submitBtn.textContent='発行中...';
    try{
      // v4.19: /consent/create 前に必ず /sync で患者を D1 にアップサート（404「患者が見つかりません」防止）
      try{
        await fetch(API+'/sync',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.token},
          body:JSON.stringify(D)
        });
      }catch(e){console.warn('sync before consent/create failed:',e);}
      const res=await api('/consent/create',{method:'POST',body:JSON.stringify(body)});
      if(!res?.ok){toast(res?.error||'発行に失敗しました');submitBtn.disabled=false;submitBtn.textContent='発行する（医師署名へ進む）';return;}
      const cfId=res.consent_form_id;
      // 算定対象として登録
      if(document.getElementById('cf-claim').checked){
        // signed_documents への登録は consent_form 署名完了後に finalize で行う設計
        // ここでは consent_form_id を保持して詳細画面へ遷移
      }
      toast('同意書を発行しました');
      S.consentList=null;
      S.consentId=cfId;
      S.page='consent_detail';
      rr();
    }catch(e){
      toast('エラー: '+(e.message||e));
      submitBtn.disabled=false;
      submitBtn.textContent='発行する（医師署名へ進む）';
    }
  });
  form.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'8px'}},submitBtn,btn('キャンセル','btn-out',()=>{S.page='consent';rr()})));
  w.appendChild(form);
  return w;
}

  if(cf.status==='draft'){
    actions.appendChild(btn('医師署名する','btn-pri btn-sm',async()=>{
      const name=prompt('医師署名（氏名）を入力してください');
      if(!name)return;
      const res=await api('/consent/'+cf.id+'/sign-doctor',{method:'POST',body:JSON.stringify({signature_method:'typed_name',signature_data:name})});
      if(res?.ok){toast('医師署名完了');S.consentDetail=null;rr()}else toast(res?.error||'エラー');
    }));
  }
  if(cf.status==='signed_by_doctor'){
    actions.appendChild(btn('患者署名する','btn-pri btn-sm',async()=>{
      const name=prompt('患者署名（氏名）を入力してください');
      if(!name)return;
      const res=await api('/consent/'+cf.id+'/sign-patient',{method:'POST',body:JSON.stringify({signature_method:'typed_name',signature_data:name})});
      if(res?.ok){
        toast('患者署名完了・確定しました');
        // 確定後、signed_documents に finalize
        await finalizeConsentSignedDoc(cf.id);
        S.consentDetail=null;rr();
      }else toast(res?.error||'エラー');
    }));
  }
  if(cf.status==='signed_by_patient'||cf.status==='shared'){
    actions.appendChild(btn('PDFをプレビュー','btn-out btn-sm',()=>previewConsentPDF(cf.id)));
    actions.appendChild(btn('QR検証URLをコピー','btn-out btn-sm',async()=>{
      const sdRes=await api('/signed-docs/by-doc/consent_form/'+cf.id);
      if(sdRes?.signed_document?.qr_payload){
        navigator.clipboard.writeText(sdRes.signed_document.qr_payload);
        toast('検証URLをコピーしました');
      }
    }));
  }
  if(cf.status==='draft'||cf.status==='signed_by_doctor'||cf.status==='signed_by_patient'){
    actions.appendChild(btn('取消し','btn-out btn-sm',async()=>{
      if(!confirm('この同意書を取消しますか？（改ざん防止のため履歴は残ります）'))return;
      const reason=prompt('取消し理由')||'';
      const res=await api('/consent/'+cf.id+'/revoke',{method:'POST',body:JSON.stringify({reason})});
      if(res?.ok){toast('取消しました');S.consentDetail=null;rr()}
    }));
  }
  w.appendChild(actions);
  // 署名履歴
  if(sigs.length){
    w.appendChild(h('h3',{style:{fontSize:'14px',fontWeight:'700',margin:'12px 0 6px'}},'署名履歴（改ざん不可）'));
    const sigList=h('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}});
    sigs.forEach(s=>{
      const roleLabel={'doctor':'医師','patient':'患者','acupuncturist':'施術者'}[s.signer_role]||s.signer_role;
      sigList.appendChild(h('div',{style:{padding:'8px 12px',background:'#fff',border:'1px solid #e5e7eb',borderRadius:'6px',fontSize:'12px'}},
        h('div',{style:{display:'flex',justifyContent:'space-between'}},
          h('span',{style:{fontWeight:'700'}},roleLabel),
          h('span',{style:{color:'#64748b'}},(s.signed_at||'').replace('T',' ').slice(0,19))
        ),
        h('div',{style:{fontFamily:'monospace',fontSize:'10px',color:'#94a3b8',marginTop:'2px'}},'HASH: '+(s.event_hash||'').slice(0,32)+'...')
      ));
    });
    w.appendChild(sigList);
  }
  return w;
}

async function finalizeConsentSignedDoc(cfId){
  // consent_form を signed_documents に登録（改ざん防止確定）
  try{
    const detail=await api('/consent/'+cfId);
    if(!detail?.consent_form)return;
    const cf=detail.consent_form;
    await api('/signed-docs/finalize',{method:'POST',body:JSON.stringify({
      doc_kind:'consent_form',
      doc_id:cfId,
      title:'訪問マッサージ（鍼灸）同意書（'+cf.consent_type+'）',
      content:detail,
      patient_id:cf.patient_id,
      insurance_claim_kind:'b013_ryouyouhi_doui',
      claim_points:100,
      claim_unit:'medical_points'
    })});
  }catch(e){console.error('finalize failed',e);}
}

async function previewConsentPDF(cfId){
  // データ取得を先行（同意種別に応じてテンプレを分岐するため）
  // signed_document は未署名時に 404 を返すため silent404 でサイレント化
  const [detail,sdRes]=await Promise.all([
    api('/consent/'+cfId),
    api('/signed-docs/by-doc/consent_form/'+cfId,{silent404:true})
  ]);
  if(!detail?.consent_form){toast('データ取得失敗');return;}
  const cf=detail.consent_form;
  const sd=sdRes?.signed_document;
  // テンプレ選択: 厚労省様式の医師交付同意書（はり・きゅう / マッサージ） or コンパス依頼書（既定）
  let tplPath='assets/consent_form_template.html';
  let renderFn='consentTemplateRender';
  if(cf.consent_type==='acupuncture'){
    tplPath='assets/consent_form_acupuncture_template.html';
    renderFn='consentAcupunctureTemplateRender';
  }else if(cf.consent_type==='massage'){
    tplPath='assets/consent_form_massage_template.html';
    renderFn='consentMassageTemplateRender';
  }
  const win=window.open(tplPath,'_blank');
  if(!win){toast('ポップアップがブロックされました');return;}
  // 和暦変換
  const d=new Date(cf.consent_date);
  const reiwaYear=d.getFullYear()-2018;
  // difficulty_reasons パース
  let dr={};
  try{dr=typeof cf.difficulty_reasons==='string'?JSON.parse(cf.difficulty_reasons):cf.difficulty_reasons||{}}catch(e){}
  // form_payload パース（v14：症状・施術部位等の構造化フォームデータ）
  let fp={};
  try{fp=typeof cf.form_payload==='string'?JSON.parse(cf.form_payload):cf.form_payload||{}}catch(e){}
  // 保険医療機関情報：D1 の値を優先、未設定なら「医療法人コンパス」既定値
  // 歯科は指示書交付不可のため、フル表記ではなく法人名のみ
  const clinicCommon={
    name:cf.clinic_name||'医療法人コンパス',
    address:cf.clinic_address||'〒330-0854　埼玉県さいたま市大宮区桜木町4-692-1　伊田グループビルⅢ405号室',
    tel:cf.clinic_tel||'048-783-2713',
    fax:cf.clinic_fax||'03-6369-4732'
  };
  // 患者情報：D1 のスナップショットを優先、未設定ならフォーム未入力
  const patientInfo={
    name:cf.patient_name||'',
    address:cf.patient_address||'',
    phone:''
  };
  // 患者生年月日（和暦JSON or ISO の両対応）
  if(cf.patient_birth){
    try{
      const pb=typeof cf.patient_birth==='string' && cf.patient_birth.startsWith('{')
        ? JSON.parse(cf.patient_birth)
        : null;
      if(pb && pb.era){patientInfo.birth=pb;}
      else if(typeof cf.patient_birth==='string' && cf.patient_birth.includes('-')){
        const pbd=new Date(cf.patient_birth);
        // ざっくり昭和=1926-1989 / 平成=1989-2019 / 令和=2019-
        const y=pbd.getFullYear();
        let era='R', yearInEra=y-2018;
        if(y<1989){era='S';yearInEra=y-1925;}
        else if(y<2019){era='H';yearInEra=y-1988;}
        patientInfo.birth={era,year:yearInEra,month:pbd.getMonth()+1,day:pbd.getDate()};
      }
    }catch(e){}
  }
  const data={
    sd_id:sd?.id||'未確定',
    content_hash:sd?.content_hash||cf.content_hash||'',
    chain_index:sd?.chain_index||cf.chain_index||0,
    qr_image_base64:'',  // QR は別途生成
    verify_url:sd?.qr_payload||'',
    addressee:cf.clinic_name||'医療法人コンパス',
    visit_plan:cf.visit_plan||'年２回（６か月に１回）',
    difficulty_reasons:dr,
    consent_date:{year:reiwaYear,month:d.getMonth()+1,day:d.getDate()},
    consent_date_jp:{year:reiwaYear,month:d.getMonth()+1,day:d.getDate()},
    exam_date:{year:reiwaYear,month:d.getMonth()+1,day:d.getDate()},
    patient:patientInfo,
    clinic:clinicCommon,
    doctor:{name:cf.doctor_name||'後藤 基温',has_seal:!!sd},
    notes:cf.notes||'',
    // 厚労省様式 V2 用：form_payload から症状・施術部位等を展開
    symptoms:fp.symptoms,
    treatments:fp.treatments,
    visit:fp.visit,
    disease_name:fp.disease_name||cf.disease_names,
    diseases:fp.diseases,
    onset:fp.onset,
    consent_type:cf.consent_type==='acupuncture'||cf.consent_type==='massage' ? (fp.consent_type||'new') : undefined,
    signature: sd ? {signed_at:sd.signed_at||sd.created_at||(new Date().toISOString())} : undefined,
    timestamp: sd?.tsa_payload ? (typeof sd.tsa_payload==='string'?JSON.parse(sd.tsa_payload):sd.tsa_payload) : undefined,
    tsa: sd?.tsa_authority ? {authority:sd.tsa_authority,acquired_at:sd.tsa_acquired_at} : undefined
  };
  // テンプレートのロード完了を待つ
  win.addEventListener('load',()=>{
    if(win[renderFn]){
      win[renderFn](data);
      // QR を qrcode ライブラリで生成（CDN 動的読込）
      if(sd?.qr_payload){
        const script=win.document.createElement('script');
        script.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
        script.onload=()=>{
          const qrDiv=win.document.createElement('div');
          win.document.body.appendChild(qrDiv);
          new win.QRCode(qrDiv,{text:sd.qr_payload,width:120,height:120});
          setTimeout(()=>{
            const img=qrDiv.querySelector('img');
            if(img&&win.document.getElementById('qr-image'))win.document.getElementById('qr-image').src=img.src;
            qrDiv.remove();
          },300);
        };
        win.document.head.appendChild(script);
      }
    }
  });
}

function showKyotakuModal(ex){
  if(!D.kyotakuRecords)D.kyotakuRecords=[];

  if(isE){
    m.appendChild(h('div',{style:{margin:'14px 0',padding:'10px 12px',background:r.acknowledged_at?'#dcfce7':'#fef3c7',border:'1px solid '+(r.acknowledged_at?'#86efac':'#fde68a'),borderRadius:'8px'}},
      h('div',{style:{fontSize:'12px',fontWeight:'700',color:r.acknowledged_at?'#15803d':'#92400e',marginBottom:'4px'}},

        r.acknowledged_at?(r.acknowledged_at.slice(0,16).replace('T',' ')+(r.acknowledged_by?' by '+r.acknowledged_by:'')):'宛先機関側で受領確認の操作待ち'),
      !r.acknowledged_at?btn('（手動で）受領確認','btn-xs btn-out',()=>{
        r.acknowledged_at=now();r.acknowledged_by=prompt('受領した宛先医師名（任意）')||'宛先機関';
        addAudit(r.audit,'受領確認',r.acknowledged_by);
        D.medicalReferrals=D.medicalReferrals.map(x=>x.id===r.id?r:x);sv();S.modal=null;showReferralModal(r);
      }):null
    ));
  }
  m.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'16px',flexWrap:'wrap'}},
    btn(isE?'保存':'発行','btn-pri',()=>{
      if(!r.patient_id){toast('患者必須');return}
      if(!r.to_org_name){toast('宛先機関必須');return}
      if(!r.purpose){toast('紹介目的必須');return}
      if(!r.diagnosis){toast('診断必須');return}
      if(!isE){
        r.id='rf_'+(typeof uid==='function'?uid():Math.random().toString(36).slice(2,8));
        addAudit(r.audit,'診療情報提供書発行',r.to_org_name);
        D.medicalReferrals.push(r);
      }else{
        addAudit(r.audit,'診療情報提供書更新','');
        D.medicalReferrals=D.medicalReferrals.map(x=>x.id===r.id?r:x);

      sv();S.modal=null;toast(isE?'保存':'発行完了');rr();

      sv();S.modal=null;toast('非表示にしました');rr();
    }):null,
    btn('キャンセル','btn-sec',()=>{S.modal=null;rr()})
  ));
  S.modal=m;rr();
}

        h('td',{style:{padding:'6px',borderBottom:'1px solid #f3f4f6'}},row.claim_status),
        h('td',{style:{padding:'6px',textAlign:'right',borderBottom:'1px solid #f3f4f6'}},row.cnt),
        h('td',{style:{padding:'6px',textAlign:'right',borderBottom:'1px solid #f3f4f6'}},(row.total_points||0)+'点')

  w.appendChild(h('div',{style:{fontWeight:'700',marginBottom:'8px',fontSize:'14px'}},'算定対象の文書'));

    w.appendChild(h('div',{style:{padding:'20px',textAlign:'center',color:'#94a3b8',fontSize:'13px',background:'#f9fafb',borderRadius:'6px'}},'算定対象の文書はありません'));
