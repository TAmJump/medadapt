// ── NDA文面（当事者型電子署名） ──
const NDA_TEXT = `秘密保持契約書

甲（　　　　　　　　　　　　　）と乙（　　　　　　　　　　　　　）とは、MedAdaptを通じた業務連携（以下「本連携」という。）において相互に開示される情報の秘密保持について、以下のとおり合意する。

第1条（目的）
本契約は、本連携に関して甲乙間で開示される患者・利用者情報、医療・介護・福祉情報および業務上の機密情報等を適切に管理し、関係者のプライバシーを保護するとともに、安全な業務連携を実現することを目的とする。

第2条（秘密情報の定義）
本契約における「秘密情報」とは、書面・口頭・電子データ等の形式を問わず、本連携に関連して相手方から開示された以下の情報をいう。
（1）患者・利用者の氏名・生年月日・住所・診断名・医療処置・介護情報・家族構成その他の個人情報
（2）業務上のノウハウ・技術情報・経営情報・財務情報・サービス内容
（3）本連携の内容・条件・経緯に関する情報
（4）その他、開示者が秘密である旨を明示した情報
ただし、次のいずれかに該当するものは秘密情報に含まれない。
（ア）開示を受けた時点で既に公知であった情報
（イ）開示後、受領者の責によらず公知となった情報
（ウ）受領者が正当な権限を有する第三者から秘密保持義務なく取得した情報
（エ）開示を受ける前から受領者が保有していた情報

第3条（秘密保持義務）
甲および乙は、相手方から開示された秘密情報を厳に秘密として保持し、事前の書面による承諾なく第三者に開示・漏洩してはならない。本連携の目的以外に秘密情報を使用してはならない。

第4条（開示範囲の制限）
甲および乙は、秘密情報を本連携の遂行に必要な範囲の役員・従業員・外部専門家（弁護士・医師・ケアマネジャー・相談員等）にのみ開示することができる。この場合、当該者に本契約と同等の秘密保持義務を遵守させる責任を負う。

第5条（情報管理）
甲および乙は、秘密情報の漏洩・紛失・改ざんを防止するため、合理的な安全管理措置を講じる。電子データについては適切なアクセス制限を設け、目的外の複製・送信を行わない。

第6条（複製・改変の禁止）
甲および乙は、相手方の事前の書面による承諾なく秘密情報を複製・改変してはならない。承諾を得て複製した場合も、複製物は本契約と同等の管理に服する。

第7条（知的財産権）
本契約により秘密情報が開示された場合であっても、秘密情報に関する知的財産権は開示者に帰属する。本契約は、いかなる権利の譲渡・使用許諾も意味しない。

第8条（資料の返還・廃棄）
本連携が終了した場合または相手方から請求があった場合、甲および乙は秘密情報およびその複製物を速やかに返還または廃棄し、廃棄の事実を相手方に通知する。

第9条（損害賠償）
甲または乙が本契約に違反し相手方に損害を与えた場合、違反者は当該損害を賠償する責任を負う。

第10条（有効期間）
本契約は署名日から効力を生じ、本連携終了後2年間有効とする。ただし、第3条の秘密保持義務は本連携終了後も継続して適用される。

第11条（協議・管轄）
本契約に定めのない事項または解釈に疑義が生じた場合は、甲乙誠意をもって協議し解決する。協議によっても解決しない場合は、東京地方裁判所を第一審の専属的合意管轄裁判所とする。

本契約締結の証として、甲乙各1通を保有する。

甲：
　法人名　　　　　　　　　　　　　　　　　　
　住　所　　　　　　　　　　　　　　　　　　
　代表者・署名者氏名　　　　　　　　　　　　

乙：
　法人名　　　　　　　　　　　　　　　　　　
　住　所　　　　　　　　　　　　　　　　　　
　代表者・署名者氏名　　　　　　　　　　　　`;
// ── Adapt モジュール設定（ブランド切り替えはここだけ変える）──
const APP_CONFIG = {
  name:       'MedAdapt',
  tagline:    '医療介護連携OS',
  module_id:  'medical-adapt',
  accent:     '#0891b2',
  logo_emoji: '🏥',
  parent_app: 'Adapt'
};
const WHEREBY_API_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2FjY291bnRzLmFwcGVhci5pbiIsImF1ZCI6Imh0dHBzOi8vYXBpLmFwcGVhci5pbi92MSIsImV4cCI6OTAwNzE5OTI1NDc0MDk5MSwiaWF0IjoxNzc2MTM4NTA4LCJvcmdhbml6YXRpb25JZCI6MzM4NTAyLCJqdGkiOiI5NWExNjQ1ZC00YjkzLTQ0ZjQtYTE0Ni0xZTBiZDMxN2EzMjkifQ.Zj3MJ92mLCp-wpY6Jw00ul0Ka6HLy4tpcVHTlyOPXIo';

let D={users:[],patients:[],cases:[],conferences:[],monitors:[],assessments:[]};
let S={user:null,scr:'login',page:'patients',toast:null,tt:null,loginErr:'',signupStep:1,signupPlan:'free',signupData:{},unreadCount:0,moduleAccess:null,notifList:null,noticeId:null,noticeData:null,ndaList:null,dischargeList:null,
  ptId:null,hubTab:'overview',caseId:null,caseTab:'schedule',confId:null,confTab:'info',monId:null,monTab:'status',assId:null,
  modal:null,signed:false,np:{n:'',r:''},shareStep:1,ptFilter:'all',token:null,pendingShares:[]};

// ── API Helper ──
async function api(path,opts={}){
  const headers={'Content-Type':'application/json'};
  if(S.token)headers['Authorization']='Bearer '+S.token;
  try{
    const res=await fetch(API+path,{...opts,headers:{...headers,...(opts.headers||{})}});
    const data=await res.json();
    if(!res.ok){
      if(res.status===401){stopNotifPolling();S.token=null;S.user=null;S.moduleAccess=null;S.unreadCount=0;localStorage.removeItem('medadapt_token');localStorage.removeItem('medadapt-autologin');localStorage.removeItem('medadapt-last-email');try{sessionStorage.removeItem('medadapt-invite-token');}catch(e){}S.scr='login';rr();return null;}
      toast(data.error||'エラーが発生しました');return null;
    }
    return data;
  }catch(e){console.error('API error:',e);return null;}
}

// ── Token persistence ──
function loadToken(){S.token=localStorage.getItem('medadapt_token')||null;}
function saveToken(t){S.token=t;if(t)localStorage.setItem('medadapt_token',t);else localStorage.removeItem('medadapt_token');}

// ── API-based data loading ──
async function loadPatients(){
  const d=await api('/patients'+(S.ptFilter&&S.ptFilter!=='all'?'?status='+S.ptFilter:''));
  if(d)D.patients=d.patients||[];
}
async function loadCases(pid){const d=await api('/patients/'+pid+'/cases');if(d)D.cases=(D.cases||[]).filter(c=>c.patient_id!==pid).concat(d.cases||[]);}
async function loadConfs(pid){const d=await api('/patients/'+pid+'/conferences');if(d)D.conferences=(D.conferences||[]).filter(c=>c.patient_id!==pid).concat(d.conferences||[]);}
async function loadMons(pid){const d=await api('/patients/'+pid+'/monitors');if(d)D.monitors=(D.monitors||[]).filter(c=>c.patient_id!==pid).concat(d.monitors||[]);}
async function loadAssess(pid){const d=await api('/patients/'+pid+'/assessments');if(d)D.assessments=(D.assessments||[]).filter(a=>a.patient_id!==pid).concat(d.assessments||[]);}
async function loadPendingShares(){const d=await api('/shares/pending');if(d)S.pendingShares=d.shares||[];}

function h(t,a,...ch){const e=document.createElement(t);if(a)Object.entries(a).forEach(([k,v])=>{if(v==null)return;if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')e.className=v;else if(k==='innerHTML')e.innerHTML=v;else e.setAttribute(k,v)});ch.flat(9).forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c)});return e}
function btn(t,cls,fn,dis){return h('button',{className:'btn '+cls,onClick:fn,disabled:dis||undefined},t)}
function fld(lbl,id,val,fn,o={}){const w=h('div',{className:'field'}),lb=h('label',{for:id},lbl);if(o.req)lb.appendChild(h('span',{className:'rq'},' *'));w.appendChild(lb);if(o.opts){const s=h('select',{id,onInput:e=>fn(e.target.value)});s.appendChild(h('option',{value:''},'選択'));o.opts.forEach(x=>{const op=h('option',{value:x.v||x},x.l||x);if(val===(x.v||x))op.selected=true;s.appendChild(op)});w.appendChild(s)}else if(o.ta){const ta=h('textarea',{id,rows:o.rows||'3',placeholder:o.ph||'',onInput:e=>fn(e.target.value)});ta.textContent=val||'';w.appendChild(ta)}else{w.appendChild(h('input',{id,type:o.type||'text',value:val||'',placeholder:o.ph||'',onInput:e=>fn(e.target.value)}))}return w}
function chk(lbl,val,fn){return h('label',{className:'chk'},h('input',{type:'checkbox',checked:val,onChange:e=>fn(e.target.checked)}),h('span',{style:{fontSize:'13px'}},lbl))}
function bdg(l,c){const isRed=c==='red'||c==='#dc2626'||c==='var(--red)';return h('span',{className:'badge',style:{background:isRed?'#dc262618':'#0891b218',color:isRed?'#dc2626':'#1e293b'}},l)}
function toast(m){S.toast=m;if(S.tt)clearTimeout(S.tt);S.tt=setTimeout(()=>{S.toast=null;rr()},1200);rr()}
// 患者データのオーナーEmail（スタッフは法人adminのemail、管理者は自分のemail）
function getOwnerEmail(){return S.user?.owner_email||S.user?.email||'';}

// ── 通知取得（30秒ごとにポーリング）──
async function loadNotifications(){
  if(!S.token)return;
  try{
    const res=await fetch(API+'/notifications/unread',{headers:{'Authorization':'Bearer '+S.token}});
    if(res.ok){const d=await res.json();const prev=S.unreadCount;S.unreadCount=d.count||0;if(S.unreadCount!==prev)rr();}
  }catch(e){}
}
let _notifTimer=null;
function startNotifPolling(){
  if(_notifTimer)clearInterval(_notifTimer);
  loadNotifications();
  _notifTimer=setInterval(loadNotifications,30000);
}
function stopNotifPolling(){if(_notifTimer){clearInterval(_notifTimer);_notifTimer=null;}}

// ── モジュール利用権チェック ──
async function checkModuleAccess(){
  if(!S.token)return;

function revokeShareOnNG(c){
  // NGになったケースの患者に紐づく共有を取消（記録は残す）
  const pt=D.patients.find(p=>p.id===c.patientId);
  if(!pt||!pt.sharedWith)return;
  // ケースの参加者の事業所を特定し、その共有を取消
  const partOrgs=(c.parts||[]).map(p=>p.org).filter(Boolean);
  pt.sharedWith.forEach(sh=>{
    if(sh.status==='active'&&partOrgs.includes(sh.org)){
      sh.status='revoked';
      sh.revokeReason='NG（'+c.st+'）：'+(c.ngReason||'');
      sh.revokedAt=now();
      addAudit(pt.audit||[],'共有自動停止（NG）',sh.org+' - '+c.ngReason);
    }
  });
  D.patients=D.patients.map(x=>x.id===pt.id?pt:x);
}

function downloadCSV(rows,fn){const b='\uFEFF';const csv=rows.map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob([b+csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click()}
function freeCheck(type){
  if(!S.user||S.user.plan==='pro')return true;
  // 患者登録数チェック
  if(type==='patients'){
    if(D.patients.length>=3){toast('Freeプランは患者登録3件まで。Proプランへアップグレードしてください。');return false;}
    return true;
  }
  const mo=now().slice(0,7);
  if(!S.user.usage)S.user.usage={};
  if(!S.user.usage[mo])S.user.usage[mo]={cases:0,confs:0,mons:0,assess:0};
  const ug=S.user.usage[mo];
  const lim={cases:1,confs:1,mons:1,assess:1};
  if((ug[type]||0)>=(lim[type]||0)){
    const names={cases:'受入れ・移行ケース',confs:'サービス担当者会議',mons:'モニタリング',assess:'アセスメント'};
    toast('Freeプランは'+(names[type]||type)+'月1回まで。Proプランへアップグレードしてください。');
    return false;
  }
  return true;
}

// === QR CODE MODAL ===
function showQRModal(opts){
  const name=opts.name,url=opts.url;
  const ov=document.createElement('div');
  ov.id='qr-modal-overlay';
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:9999';
  const box=document.createElement('div');
  box.style.cssText='background:#fff;padding:32px;border-radius:16px;text-align:center;max-width:360px;width:90%';

  const title=document.createElement('div');
  title.style.cssText='font-size:16px;font-weight:800;margin-bottom:4px';
  title.textContent=name;
  box.appendChild(title);

  const sub=document.createElement('div');
  sub.style.cssText='font-size:12px;color:#64748b;margin-bottom:16px';
  sub.textContent='QRコードでログイン';
  box.appendChild(sub);

  const qrWrap=document.createElement('div');
  qrWrap.id='qr-canvas-wrap';
  qrWrap.style.cssText='margin:0 auto 16px;width:200px;height:200px;background:#f1f5f9;border-radius:8px;display:flex;align-items:center;justify-content:center';
  qrWrap.textContent='生成中...';
  box.appendChild(qrWrap);

  const urlTxt=document.createElement('div');
  urlTxt.style.cssText='font-size:10px;color:#94a3b8;word-break:break-all;margin-bottom:16px;padding:8px;background:#f8fafc;border-radius:6px';
  urlTxt.textContent=url;
  box.appendChild(urlTxt);

  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px;justify-content:center';

  const btnCopy=document.createElement('button');
  btnCopy.textContent='URLコピー';
  btnCopy.style.cssText='padding:8px 16px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px';
  btnCopy.onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(url).then(function(){alert('URLをコピーしました');});};
  btnRow.appendChild(btnCopy);

  const btnPrint=document.createElement('button');
  btnPrint.textContent='印刷';
  btnPrint.style.cssText='padding:8px 16px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px';
  btnPrint.onclick=function(){window.print();};
  btnRow.appendChild(btnPrint);

  const btnClose=document.createElement('button');
  btnClose.textContent='閉じる';
  btnClose.style.cssText='padding:8px 16px;border:none;border-radius:8px;background:#0891b2;color:#fff;cursor:pointer;font-weight:700;font-size:13px';
  btnClose.onclick=function(){var el=document.getElementById('qr-modal-overlay');if(el)el.remove();};
  btnRow.appendChild(btnClose);

  box.appendChild(btnRow);
  ov.appendChild(box);
  document.body.appendChild(ov);

  var script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  script.onload=function(){
    var wrap=document.getElementById('qr-canvas-wrap');
    if(wrap){wrap.textContent='';new QRCode(wrap,{text:url,width:200,height:200,colorDark:'#0c4a6e',colorLight:'#ffffff'});}
  };
  document.head.appendChild(script);
}

      if(res?.success){S.modal=null;S.ndaList=null;toast(res.message);rr();}

  S.modal=modal;rr();

// NDA操作モーダル（削除・終了・取り下げ）

  const cfg={
    delete: {title:'紙NDA削除',msg:'この紙締結記録を削除しますか？この操作は元に戻せません。',btn:'削除する',btnClass:'btn-danger',needPw:true},

    withdraw: {title:'申請取り下げ',msg:'このNDA申請を取り下げますか？',btn:'取り下げる',btnClass:'btn-sec',needPw:false},
  };
  const c=cfg[action];
  const modal=h('div',{className:'modal',style:{maxWidth:'440px'}});

  if(c.needPw){
    modal.appendChild(h('div',{style:{marginBottom:'12px',marginTop:'10px'}},

        h('input',{id:'nda_action_pw',type:'password',placeholder:'現在のパスワード',
          style:{width:'100%',padding:'8px 10px',paddingRight:'44px',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'13px',boxSizing:'border-box'}}),
        h('button',{type:'button',style:{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:'13px',color:'var(--ink-m)'},
          onClick:()=>{const i=document.getElementById('nda_action_pw');if(i)i.type=i.type==='password'?'text':'password';}},'表示')
      )
    ));
  }
  modal.appendChild(h('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}},
    btn('キャンセル','btn-sec',()=>{S.modal=null;rr()}),
    btn(c.btn,'btn-pri '+c.btnClass,async()=>{
      const pw=c.needPw?document.getElementById('nda_action_pw')?.value?.trim():null;
      if(c.needPw&&!pw){toast('パスワードを入力してください');return;}
      let res;
      if(action==='delete') res=await api('/nda/'+nda.id,{method:'DELETE',body:JSON.stringify({password:pw})});
      else if(action==='terminate') res=await api('/nda/'+nda.id+'/terminate',{method:'POST',body:JSON.stringify({password:pw})});
      else if(action==='withdraw') res=await api('/nda/'+nda.id+'/withdraw',{method:'POST',body:JSON.stringify({})});
      if(res?.success){S.modal=null;S.ndaList=null;toast(res.message);rr();}
      else toast(res?.error||'エラーが発生しました');
    })
  ));
  S.modal=modal;rr();
}

function ndaPage(){
  const w=h('div',{style:{padding:'24px',maxWidth:'720px'}});
  w.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}},
    h('h2',{style:{fontSize:'20px',fontWeight:'800',margin:'0'}},'NDA管理'),
    btn('+ NDA締結を申請する','btn-pri btn-sm',()=>showNdaRequestModal())
  ));

  if(!S.ndaList){
    api('/nda/list').then(res=>{S.ndaList=res?.ndas||[];rr()});
    w.appendChild(h('div',{style:{padding:'40px',textAlign:'center',color:'var(--ink-l)'}},'読み込み中...'));
    return w;
  }

  // 検索・絞り込みバー
  if(!S.ndaFilter)S.ndaFilter={q:'',type:'all',sort:'newest'};
  const f=S.ndaFilter;
  const filterBar=h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px',flexWrap:'wrap',alignItems:'center',background:'var(--surface)',padding:'10px 12px',borderRadius:'10px',border:'1px solid var(--border)'}});
  let _ndaIme=false;
  filterBar.appendChild(h('input',{type:'text',placeholder:'法人名・IDで検索',value:f.q,
    style:{flex:'1',minWidth:'140px',padding:'6px 10px',border:'1px solid var(--border)',borderRadius:'6px',fontSize:'12px'},
    onCompositionStart:()=>{_ndaIme=true;},
    onCompositionEnd:e=>{_ndaIme=false;f.q=e.target.value;rr();},
    onInput:e=>{if(!_ndaIme){f.q=e.target.value;rr();}}}));
  const typeSelect=h('select',{style:{padding:'6px 8px',border:'1px solid var(--border)',borderRadius:'6px',fontSize:'12px'},
    onChange:e=>{f.type=e.target.value;rr()}});
  [['all','すべて'],['active','締結済み'],['pending','署名待ち'],['standard','標準書式'],['custom','自社書式'],['paper','紙締結']].forEach(([v,l])=>{
    const o=h('option',{value:v},l);if(f.type===v)o.selected=true;typeSelect.appendChild(o);
  });
  filterBar.appendChild(typeSelect);
  const sortSelect=h('select',{style:{padding:'6px 8px',border:'1px solid var(--border)',borderRadius:'6px',fontSize:'12px'},
    onChange:e=>{f.sort=e.target.value;rr()}});
  [['newest','新しい順'],['oldest','古い順'],['name','法人名順']].forEach(([v,l])=>{
    const o=h('option',{value:v},l);if(f.sort===v)o.selected=true;sortSelect.appendChild(o);
  });
  filterBar.appendChild(sortSelect);
  w.appendChild(filterBar);

  // フィルタ適用
  let filtered=S.ndaList.filter(n=>{
    const q=f.q.toLowerCase();
    if(q&&!(n.partner_org||'').toLowerCase().includes(q)&&!(n.partner_login_id||'').toLowerCase().includes(q))return false;
    if(f.type==='active')return n.status==='active';
    if(f.type==='pending')return n.status==='pending';
    if(f.type==='standard')return n.nda_type==='standard'&&n.status==='active';
    if(f.type==='custom')return n.nda_type==='custom'&&n.status==='active';
    if(f.type==='paper')return n.nda_type==='paper';
    return true;
  });
  if(f.sort==='newest')filtered.sort((a,b)=>new Date(b.requested_at)-new Date(a.requested_at));
  else if(f.sort==='oldest')filtered.sort((a,b)=>new Date(a.requested_at)-new Date(b.requested_at));
  else filtered.sort((a,b)=>(a.partner_org||a.partner_login_id||'').localeCompare(b.partner_org||b.partner_login_id||''));

  w.appendChild(h('div',{style:{fontSize:'11px',color:'var(--ink-l)',marginBottom:'10px'}},
    filtered.length<S.ndaList.length?S.ndaList.length+'件中 '+filtered.length+'件表示':'全'+S.ndaList.length+'件'
  ));

  if(!filtered.length){
    w.appendChild(h('div',{style:{padding:'32px',textAlign:'center',color:'var(--ink-l)',background:'var(--surface)',borderRadius:'10px',fontSize:'13px'}},'条件に一致するNDAがありません'));
    return w;
  }

  const typeMap={standard:{label:'標準書式',color:'#0891b2',bg:'#e0f2fe'},custom:{label:'自社書式',color:'#7c3aed',bg:'#f5f3ff'},paper:{label:'紙締結',color:'#16a34a',bg:'#f0fdf4'}};
  const ndaList=h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}});
  for(const nda of filtered){
    const tm=typeMap[nda.nda_type||'standard']||typeMap.standard;
    if(nda.status==='pending'){
      ndaList.appendChild(h('div',{style:{background:nda.is_requester?'#fafafa':'#fff7ed',border:'1px solid '+(nda.is_requester?'var(--border)':'#fed7aa'),borderRadius:'10px',padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div',null,
          h('div',{style:{fontWeight:'700',fontSize:'13px'}},nda.is_requester?(nda.partner_org||nda.partner_login_id)+'に申請中':(nda.partner_org||nda.partner_login_id)+'からNDA締結申請が届いています'),
          h('div',{style:{fontSize:'11px',color:'var(--ink-l)',marginTop:'2px'}},new Date(nda.requested_at).toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}))
        ),
        h('div',{style:{display:'flex',gap:'6px',alignItems:'center'}},
          nda.is_requester?h('span',{style:{fontSize:'11px',color:'var(--ink-l)'}},'相手の署名待ち'):btn('NDAを確認して署名する','btn-pri btn-sm',()=>showNdaSignModal(nda)),
          nda.is_requester?btn('取り下げ','btn-xs btn-out',()=>showNdaActionModal(nda,'withdraw')):null
        )
      ));
    } else {
      ndaList.appendChild(h('div',{style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'10px',padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div',{style:{flex:'1'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'2px'}},
            h('div',{style:{fontWeight:'700',fontSize:'13px'}},(nda.partner_org||nda.partner_login_id)),
            h('span',{style:{fontSize:'10px',fontWeight:'700',color:tm.color,background:tm.bg,padding:'1px 7px',borderRadius:'20px'}},tm.label)
          ),
          h('div',{style:{fontSize:'11px',color:'var(--ink-l)',lineHeight:'1.7'}},
            '締結日: '+new Date(nda.signed_at||nda.requested_at).toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})+
            (nda.signer_name?'　署名者: '+nda.signer_name+(nda.signer_role?' ('+nda.signer_role+')':''):'')
          ),
          nda.paper_note?h('div',{style:{fontSize:'11px',color:'var(--ink-l)'}},'メモ: '+nda.paper_note):null
        ),
        h('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexShrink:'0'}},
          nda.nda_type==='paper'&&nda.has_file?btn('原本を開く','btn-xs btn-out',async()=>{
            const res=await api('/nda/'+nda.id+'/file');
            if(!res||res.error){toast('ファイルの取得に失敗しました');return;}
            try{
              const mimeType=res.file_type||'application/pdf';
              const byteChars=atob(res.data);
              const byteArr=new Uint8Array(byteChars.length);
              for(let i=0;i<byteChars.length;i++)byteArr[i]=byteChars.charCodeAt(i);
              const blob=new Blob([byteArr],{type:mimeType});
              const url=URL.createObjectURL(blob);
              window.open(url,'_blank');
            }catch(e){toast('ファイルの展開に失敗しました');}
          }):null,
          nda.nda_type==='paper'&&!nda.has_file?h('span',{style:{fontSize:'11px',color:'var(--ink-l)'}},'添付なし'):null,
          nda.nda_type!=='paper'?btn('PDF出力','btn-xs btn-out',()=>genNdaPdf(nda)):null,
          nda.nda_type==='paper'?btn('削除','btn-xs btn-danger',()=>showNdaActionModal(nda,'delete')):btn('終了','btn-xs btn-out',()=>showNdaActionModal(nda,'terminate')),
          h('span',{style:{background:'#dcfce7',color:'#15803d',padding:'2px 10px',borderRadius:'100px',fontSize:'11px',fontWeight:'700'}},'締結済み')
        )
      ));
    }
  }
  w.appendChild(ndaList);
  return w;
}

</style></head><body>
<div class="btn-wrap"><button onclick="window.print()">印刷 / PDF保存</button><button onclick="window.close()">閉じる</button></div>

<div class="btn-wrap"><button onclick="window.print()">印刷 / PDF保存</button></div>

// v9: 退院通知一覧ページ

function dischargePage(){
  const w=h('div',{style:{padding:'24px',maxWidth:'720px'}});
  w.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}},
    h('h2',{style:{fontSize:'20px',fontWeight:'800',margin:'0'}},'退院通知'),
    btn('+ 退院通知を発行する','btn-pri btn-sm',()=>{S.page='discharge_new';rr()})
  ));

  if(!S.dischargeList){
    api('/discharge/list').then(res=>{S.dischargeList=res;rr()});
    w.appendChild(h('div',{style:{padding:'40px',textAlign:'center',color:'var(--ink-l)'}}),'読み込み中...');
    return w;
  }

  const sent=S.dischargeList?.sent||[];
  const received=S.dischargeList?.received||[];

  if(!sent.length && !received.length){
    w.appendChild(h('div',{style:{padding:'40px',textAlign:'center',color:'var(--ink-l)',background:'var(--surface)',borderRadius:'10px',fontSize:'13px'}}),'退院通知はありません');
    return w;
  }

  // フィルターバー
  if(!S.dischargeFilter)S.dischargeFilter='all';
  const filterDefs=[
    {key:'all',l:'すべて'},{key:'pending',l:'未回答'},{key:'joined',l:'面談参加'},
    {key:'active',l:'進行中'},{key:'declined',l:'辞退済み'},{key:'ended',l:'終了'},
  ];
  const filterBar=h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'16px'}});
  filterDefs.forEach(f=>{
    const isActive=S.dischargeFilter===f.key;
    filterBar.appendChild(h('button',{
      style:{padding:'4px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:isActive?'700':'400',
        background:isActive?'var(--accent)':'var(--surface)',color:isActive?'#fff':'var(--ink-m)',
        border:'1px solid '+(isActive?'var(--accent)':'var(--border)'),cursor:'pointer',fontFamily:'inherit'},
      onClick:()=>{S.dischargeFilter=f.key;rr()}
    },f.l));
  });
  w.appendChild(filterBar);

  const fk=S.dischargeFilter;
  const filteredSent=sent.filter(n=>{
    if(fk==='all'||fk==='pending'||fk==='joined'||fk==='declined')return true;
    if(fk==='active')return n.status==='active';
    if(fk==='ended')return n.status!=='active';
    return true;
  });
  const filteredReceived=received.filter(n=>{
    if(fk==='all'||fk==='active'||fk==='ended')return true;
    if(fk==='pending')return !n.joined_at&&!n.declined_at;
    if(fk==='joined')return !!n.joined_at&&!n.declined_at;
    if(fk==='declined')return !!n.declined_at;
    return true;
  });

  if(filteredSent.length){
    w.appendChild(h('h3',{style:{fontSize:'13px',fontWeight:'700',marginBottom:'8px',color:'var(--ink-m)'}}),'発行した退院通知（'+filteredSent.length+'件）');
    const slist=h('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'24px'}});
    for(const n of filteredSent){
      slist.appendChild(h('div',{
        style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'10px',padding:'14px 16px',cursor:'pointer'},
        onClick:()=>{S.noticeId=n.id;S.noticeData=null;S.page='shared_chart';rr()}
      },
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
          h('div',null,
            h('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'4px'}},n.title),
            h('div',{style:{fontSize:'11px',color:'var(--ink-l)'}},'発行日: '+new Date(n.created_at).toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})+'\u3000送信先: '+n.recipient_count+'件\u3000参加表明: '+n.joined_count+'件')
          ),
          h('span',{style:{fontSize:'11px',background:n.status==='active'?'#dcfce7':'#f1f5f9',color:n.status==='active'?'#15803d':'#64748b',padding:'2px 8px',borderRadius:'100px'}},n.status==='active'?'進行中':'終了')
        )
      ));
    }
    w.appendChild(slist);
  }

  if(filteredReceived.length){
    w.appendChild(h('h3',{style:{fontSize:'13px',fontWeight:'700',marginBottom:'8px',color:'var(--ink-m)'}}),'受信した退院通知（'+filteredReceived.length+'件）');
    const rlist=h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}});
    for(const n of filteredReceived){
      const isDeclined=!!n.declined_at;
      const isJoined=!!n.joined_at;
      rlist.appendChild(h('div',{
        style:{background:isDeclined?'#f8fafc':'var(--surface)',border:'1px solid var(--border)',borderRadius:'10px',padding:'14px 16px',cursor:isDeclined?'default':'pointer',opacity:isDeclined?'0.6':'1'},
        onClick:()=>{if(!isDeclined){S.noticeId=n.id;S.noticeData=null;S.page='shared_chart';rr();}}
      },
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
          h('div',null,
            h('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'4px'}},n.title),
            h('div',{style:{fontSize:'11px',color:'var(--ink-l)'}},'受信日: '+new Date(n.created_at).toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}))
          ),
          h('span',{style:{fontSize:'11px',padding:'2px 8px',borderRadius:'100px',
            background:isDeclined?'#f1f5f9':isJoined?'#dbeafe':'#fef9c3',
            color:isDeclined?'#64748b':isJoined?'#1d4ed8':'#854d0e'}},
            isDeclined?'辞退済み':isJoined?'面談参加':'未回答')
        )
      ));
    }
    w.appendChild(rlist);
  }

  if(!filteredSent.length&&!filteredReceived.length){
    w.appendChild(h('div',{style:{padding:'32px',textAlign:'center',color:'var(--ink-l)',background:'var(--surface)',borderRadius:'10px',fontSize:'13px'}}),'該当する通知はありません');
  }
  return w;
}

    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
      h('div',{className:'field',style:{margin:'0'}},
        h('label',{style:{fontSize:'12px'}},'予算感（目安）'),
        h('input',{id:'dn_req_budget',type:'text',placeholder:'例：月額15万円程度',style:{width:'100%',padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'12px',boxSizing:'border-box'}})
      ),

        h('label',{style:{fontSize:'12px'}},'医療行為の必要性'),
        h('select',{id:'dn_req_nursing',style:{width:'100%',padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'12px'}},
          h('option',{value:''},'選択してください'),
          h('option',{value:'required'},'必要あり'),
          h('option',{value:'not_required'},'不要'),
          h('option',{value:'tbd'},'要確認')
        )
      ),
      h('div',{className:'field',style:{margin:'0'}},
        h('label',{style:{fontSize:'12px'}},'現在のケアマネ'),
        h('select',{id:'dn_req_caremanager',style:{width:'100%',padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'12px'}},
          h('option',{value:''},'選択してください'),
          h('option',{value:'active'},'利用中'),
          h('option',{value:'none'},'なし'),
          h('option',{value:'tbd'},'要確認')
        )
      ),
      h('div',{className:'field',style:{margin:'0'}},

        h('input',{id:'dn_req_other',type:'text',placeholder:'例：ペット同伴希望など',style:{width:'100%',padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'8px',fontSize:'12px',boxSizing:'border-box'}})
      )

  ));

  // NDA締結済みの相手リスト（チェックボックス）
  const ndaArea=h('div',{className:'field'});
  ndaArea.appendChild(h('label',null,'通知先（NDA締結済みの法人のみ選択可）'));
  const ndaBox=h('div',{style:{border:'1px solid var(--border)',borderRadius:'8px',padding:'12px',maxHeight:'200px',overflowY:'auto'}});

  if(!S.ndaList){
    ndaBox.appendChild(h('div',{style:{color:'var(--ink-l)',fontSize:'12px'}},'読み込み中...'));
    api('/nda/list').then(res=>{S.ndaList=res?.ndas||[];rr()});
  } else {
    const myOrgId=S.user?.org_id||S.user?.id;
    // 自分自身を除外 + 重複除去（同じ相手との複数NDAをまとめる）
    const seen=new Set();
    const activeNdas=S.ndaList.filter(n=>{
      if(n.status!=='active')return false;
      const partnerId=n.is_requester?n.org_id_b:n.org_id_a;
      if(partnerId===myOrgId)return false; // 自分自身を除外
      if(seen.has(partnerId))return false; // 重複除去
      seen.add(partnerId);
      return true;
    });
    if(!activeNdas.length){
      ndaBox.appendChild(h('div',{style:{color:'var(--ink-l)',fontSize:'12px'}},'NDA締結済みの法人がありません。先にNDA管理からNDAを締結してください。'));
    } else {
      activeNdas.forEach(nda=>{
        const orgId=nda.is_requester?nda.org_id_b:nda.org_id_a;
        const label=h('label',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',cursor:'pointer',fontSize:'13px'}},
          h('input',{type:'checkbox',value:orgId,className:'nda-recipient-check',style:{width:'16px',height:'16px'}}),
          h('span',null,(nda.partner_org||nda.partner_login_id))
        );
        ndaBox.appendChild(label);
      });

  ));

  const slotSection=h('div',{style:{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'10px',padding:'14px 16px',marginTop:'8px'}});
  slotSection.appendChild(h('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'2px',color:'#15803d'}},'面談の候補日程'));
  slotSection.appendChild(h('div',{style:{fontSize:'11px',color:'#16a34a',marginBottom:'10px'}},'カレンダーから日付をタップして選択してください（複数選択可）'));

  // カレンダー本体
  const yr=S.dnCalYear,mo=S.dnCalMonth;
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMo=new Date(yr,mo+1,0).getDate();
  const weekdays=['日','月','火','水','木','金','土'];
  const toDateStr=d=>`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const isSelected=d=>S.dnSlots.some(s=>s.date===toDateStr(d));
  const today=new Date();
  const isPast=d=>new Date(yr,mo,d)<new Date(today.getFullYear(),today.getMonth(),today.getDate());

  const calWrap=h('div',{style:{background:'#fff',borderRadius:'8px',border:'1px solid #d1fae5',overflow:'hidden',marginBottom:'10px'}});
  // ヘッダー
  calWrap.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'#16a34a',color:'#fff'}},
    h('button',{style:{background:'none',border:'none',color:'#fff',cursor:'pointer',fontSize:'18px',padding:'0 6px',fontFamily:'inherit'},
      onClick:()=>{if(S.dnCalMonth===0){S.dnCalMonth=11;S.dnCalYear--;}else{S.dnCalMonth--;}rr()}},'‹'),
    h('span',{style:{fontWeight:'700',fontSize:'14px'}},(mo+1)+'月 '+yr),
    h('button',{style:{background:'none',border:'none',color:'#fff',cursor:'pointer',fontSize:'18px',padding:'0 6px',fontFamily:'inherit'},
      onClick:()=>{if(S.dnCalMonth===11){S.dnCalMonth=0;S.dnCalYear++;}else{S.dnCalMonth++;}rr()}},'›')
  ));
  // 曜日ヘッダー
  const wRow=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',background:'#f0fdf4'}});
  weekdays.forEach((w2,i)=>wRow.appendChild(h('div',{style:{textAlign:'center',padding:'6px 0',fontSize:'11px',fontWeight:'700',color:i===0?'#dc2626':i===6?'#2563eb':'#374151'}},w2)));
  calWrap.appendChild(wRow);
  // 日付グリッド
  const grid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}});
  for(let i=0;i<firstDay;i++)grid.appendChild(h('div',null));
  for(let d=1;d<=daysInMo;d++){
    const ds=toDateStr(d);
    const sel=isSelected(d);
    const past=isPast(d);
    const dow=new Date(yr,mo,d).getDay();
    grid.appendChild(h('div',{
      style:{textAlign:'center',padding:'8px 2px',cursor:past?'default':'pointer',
        background:sel?'#16a34a':'transparent',
        color:sel?'#fff':past?'#cbd5e1':dow===0?'#dc2626':dow===6?'#2563eb':'var(--ink)',
        borderRadius:'50%',margin:'2px auto',width:'32px',fontSize:'13px',fontWeight:sel?'700':'400',
        opacity:past?'0.4':'1'},
      onClick:()=>{
        if(past)return;
        if(sel){S.dnSlots=S.dnSlots.filter(s=>s.date!==ds);}
        else{S.dnSlots.push({id:'s'+Date.now(),date:ds});}
        rr();
      }
    },d));
  }
  calWrap.appendChild(grid);
  slotSection.appendChild(calWrap);

  // 選択済み日程リスト
  if(S.dnSlots.length){
    const selList=h('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}});
    [...S.dnSlots].sort((a,b)=>a.date.localeCompare(b.date)).forEach(sl=>{
      const d=new Date(sl.date+'T12:00:00');
      const wdl=['日','月','火','水','木','金','土'][d.getDay()];
      const label=`${d.getMonth()+1}/${d.getDate()}(${wdl})`;
      selList.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#fff',border:'1px solid #86efac',borderRadius:'8px',padding:'8px 12px'}},
        h('span',{style:{fontSize:'13px',fontWeight:'600'}},'　'+label),
        h('button',{style:{background:'none',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'12px',padding:'0',fontFamily:'inherit'},
          onClick:()=>{S.dnSlots=S.dnSlots.filter(s=>s.date!==sl.date);rr()}},'削除')
      ));
    });
    slotSection.appendChild(selList);
  } else {
    slotSection.appendChild(h('div',{style:{textAlign:'center',padding:'8px',fontSize:'12px',color:'#6b7280'}},'カレンダーから候補日を選択してください'));
  }
  w.appendChild(slotSection);

  w.appendChild(h('div',{style:{marginTop:'16px',display:'flex',gap:'8px'}},
    btn('キャンセル','btn-sec',()=>{S.page='discharge';S.dnSlots=null;S.dnCalYear=undefined;S.dnCalMonth=undefined;rr()}),
    btn('退院通知を送信する','btn-pri',async()=>{
      const ptId=document.getElementById('dn_patient')?.value;
      const title=document.getElementById('dn_title')?.value?.trim();
      const memo=document.getElementById('dn_memo')?.value?.trim();
      const checks=[...document.querySelectorAll('.nda-recipient-check:checked')].map(c=>c.value);
      if(!ptId){toast('患者を選択してください');return;}
      if(!title){toast('タイトルを入力してください');return;}
      if(!checks.length){toast('通知先を選択してください');return;}
      // PDFファイル読み込み
      let pdfData='', pdfFilename='', pdfFileType='';
      const pdfFile=document.getElementById('dn_pdf_file')?.files?.[0];
      if(pdfFile){
        if(pdfFile.size>3*1024*1024){toast('PDFは3MB以下にしてください');return;}
        pdfData=await new Promise((res,rej)=>{
          const r=new FileReader();
          r.onload=()=>res(r.result.split(',')[1]);
          r.onerror=()=>rej(new Error('読み込み失敗'));
          r.readAsDataURL(pdfFile);
        });
        pdfFilename=pdfFile.name;
        pdfFileType=pdfFile.type||'application/pdf';
      }
      const requirements_data={
        budget:document.getElementById('dn_req_budget')?.value?.trim()||'',
        nursing:document.getElementById('dn_req_nursing')?.value||'',
        caremanager:document.getElementById('dn_req_caremanager')?.value||'',
        other:document.getElementById('dn_req_other')?.value?.trim()||'',
        discharge_date:discharge_date
      };
      const discharge_date=document.getElementById('dn_discharge_date')?.value||'';
      const schedule_slots=[...(S.dnSlots||[])].sort((a,b)=>a.date.localeCompare(b.date)).filter(s=>s.date).map(s=>{
        const d=new Date(s.date+'T12:00:00');
        const wdl=['日','月','火','水','木','金','土'][d.getDay()];
        return {id:s.id,datetime:s.date,label:`${d.getMonth()+1}/${d.getDate()}(${wdl})`};
      });
      const res=await api('/discharge/new',{method:'POST',body:JSON.stringify({
        patient_id:ptId,title,memo,pdf_data:pdfData,pdf_filename:pdfFilename,pdf_file_type:pdfFileType,recipient_org_ids:checks,requirements_data,schedule_slots
      })});
      if(res?.success){
        S.page='discharge';S.dischargeList=null;S.dnSlots=null;
        toast('退院通知を送信しました（'+checks.length+'件）');rr();
      } else toast(res?.error||'送信に失敗しました');
    })
  ));
  return w;
}

    )
  ));

  // メモ
  if(n.memo){
    w.appendChild(h('div',{style:{background:'#f8fafc',border:'1px solid var(--border)',borderRadius:'8px',padding:'12px 14px',marginBottom:'16px',fontSize:'13px'}},
      h('div',{style:{fontWeight:'700',fontSize:'11px',color:'var(--ink-l)',marginBottom:'4px'}},'病院からのメモ'),
      n.memo
    ));
  }

  // 病院からの要件（構造化）
  if(n.requirements_data){
    const req=n.requirements_data;
    const nursingLabel={required:'必要あり',not_required:'不要',tbd:'要確認'};
    const cmLabel={active:'利用中',none:'なし',tbd:'要確認'};
    const reqItems=[
      req.budget?['予算感',req.budget]:null,
      req.nursing?['医療行為',nursingLabel[req.nursing]||req.nursing]:null,
      req.caremanager?['ケアマネ',cmLabel[req.caremanager]||req.caremanager]:null,
      req.other?['その他',req.other]:null
    ].filter(Boolean);
    if(reqItems.length){
      w.appendChild(h('div',{style:{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:'8px',padding:'12px 14px',marginBottom:'16px'}},
        h('div',{style:{fontWeight:'700',fontSize:'11px',color:'#0369a1',marginBottom:'8px'}},'病院からの確認事項'),
        req.discharge_date?h('div',{style:{fontSize:'13px',fontWeight:'700',color:'#0369a1',marginBottom:'8px'}},'退院予定日：'+new Date(req.discharge_date+'T12:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})):null,
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}},
          ...reqItems.map(([k,v])=>h('div',{style:{fontSize:'12px'}},

            h('span',{style:{fontWeight:'600'}},v)
          ))
        )
      ));
    }
  }

  // PDF表示（全段階で表示。段階④のみDL可）
  if(n.has_pdf){
    // PDF.jsで独自レンダリング（ダウンロードボタンなし・完全制御）
    let pdfZoom=1.4;
    const pdfSection=h('div',{style:{marginBottom:'16px',width:'100%'}});
    pdfSection.appendChild(h('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'8px'}},'介護・看護サマリー（PDF）'));
    const pdfLoading=h('div',{style:{padding:'24px',textAlign:'center',color:'var(--ink-l)',background:'#fafafa',borderRadius:'8px',border:'1px solid var(--border)'}},'PDFを読み込み中...');
    pdfSection.appendChild(pdfLoading);
    w.appendChild(pdfSection);

    const renderPdf=async(pdfBytes,zoom)=>{
      // コンテナ幅に合わせてzoomを自動調整（初回のみ）
      const containerW=pdfSection.offsetWidth||700;
      // PDF.jsロード
      if(!window.pdfjsLib){
        await new Promise((res,rej)=>{
          const s=document.createElement('script');
          s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
          s.onload=res; s.onerror=rej;
          document.head.appendChild(s);
        });
        window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      const pdf=await window.pdfjsLib.getDocument({data:pdfBytes}).promise;
      // ズームコントロール
      const ctrl=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',background:'#f8fafc',borderRadius:'8px',padding:'6px 10px',border:'1px solid var(--border)'}},
        h('span',{style:{fontSize:'12px',color:'var(--ink-m)',flex:1}},pdf.numPages+'ページ'),
        h('button',{style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'6px',padding:'3px 10px',cursor:'pointer',fontSize:'14px',fontFamily:'inherit'},
          onClick:async()=>{pdfZoom=Math.max(0.5,pdfZoom-0.2);const nb=await reRender();pdfContainer.replaceWith(nb);}},'-'),
        h('span',{style:{fontSize:'12px',minWidth:'40px',textAlign:'center'}},Math.round(pdfZoom*100)+'%'),
        h('button',{style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'6px',padding:'3px 10px',cursor:'pointer',fontSize:'14px',fontFamily:'inherit'},
          onClick:async()=>{pdfZoom=Math.min(3,pdfZoom+0.2);const nb=await reRender();pdfContainer.replaceWith(nb);}},'+')
      );
      const reRender=async()=>{
        const wrap=h('div',{style:{border:'1px solid var(--border)',borderRadius:'8px',overflowY:'auto',overflowX:'hidden',background:'#525659',maxHeight:'80vh',position:'relative'}});
        for(let i=1;i<=pdf.numPages;i++){
          const page=await pdf.getPage(i);
          const vp=page.getViewport({scale:zoom});
          const canvas=document.createElement('canvas');
          canvas.width=vp.width; canvas.height=vp.height;
          canvas.style.cssText='display:block;width:100%;height:auto;margin:4px 0;box-shadow:0 2px 8px rgba(0,0,0,0.3)';
          const ctx=canvas.getContext('2d');
          await page.render({canvasContext:ctx,viewport:vp}).promise;
          // ウォーターマーク描画
          if(stage<4){
            ctx.save();
            ctx.translate(vp.width/2,vp.height/2);
            ctx.rotate(-25*Math.PI/180);
            ctx.font=`bold ${Math.round(vp.width/12)}px sans-serif`;
            ctx.fillStyle='rgba(8,145,178,0.10)';
            ctx.textAlign='center';
            const wm='閲覧専用 · '+(S.user?.org||'');
            ctx.fillText(wm,-vp.width*0.3,0);
            ctx.fillText(wm,vp.width*0.3,vp.height*0.15);
            ctx.restore();
          }
          wrap.appendChild(canvas);
        }
        return wrap;
      };
      const pdfContainer=await reRender();
      // 既存コンテンツを置換
      while(pdfSection.children.length>1)pdfSection.removeChild(pdfSection.lastChild);
      pdfSection.appendChild(ctrl);
      pdfSection.appendChild(pdfContainer);
      if(stage<4){
        pdfSection.appendChild(h('div',{style:{fontSize:'11px',color:'var(--ink-l)',marginTop:'4px',textAlign:'center'}},'閲覧専用です。受入確定後にダウンロードが可能になります。'));
      }
    };

    api('/discharge/'+n.id+'/pdf').then(async res=>{
      if(!res?.data) return;
      const byteChars=atob(res.data);
      const pdfBytes=new Uint8Array(byteChars.length);
      for(let i=0;i<byteChars.length;i++)pdfBytes[i]=byteChars.charCodeAt(i);
      // コンテナ幅取得後に自動ズーム
      await new Promise(r=>setTimeout(r,50));
      const cw=pdfSection.offsetWidth||720;
      pdfZoom=Math.max(1.0,Math.min(3.0,cw/595*0.92));
      renderPdf(pdfBytes,pdfZoom).catch(()=>{});
    }).catch(()=>{});
  } else {
    w.appendChild(h('div',{style:{background:'#fafafa',border:'1px dashed var(--border)',borderRadius:'8px',padding:'24px',textAlign:'center',color:'var(--ink-l)',marginBottom:'16px',fontSize:'13px'}},'PDFは添付されていません'));
  }

  // 発行者側：受信者リスト
  if(isIssuer && n.recipients?.length){
    w.appendChild(h('div',{style:{marginBottom:'16px'}},
      h('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'8px'}},'通知先の状況'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}},
        ...(n.recipients.map(r=>h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 12px',fontSize:'12px'}},
          h('span',null,r.org||r.login_id||r.recipient_org_id),
          h('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'4px'}},
            h('span',{style:{padding:'2px 8px',borderRadius:'100px',fontSize:'11px',fontWeight:'700',
              background:r.declined_at?'#f1f5f9':r.joined_at?'#dbeafe':'#fef9c3',
              color:r.declined_at?'#64748b':r.joined_at?'#1d4ed8':'#854d0e'}},
              r.declined_at?'辞退':r.joined_at?'面談参加':'未回答'),
            r.declined_at&&r.decline_reason?h('div',{style:{fontSize:'10px',color:'var(--ink-l)',maxWidth:'200px',textAlign:'right'}},r.decline_reason):null,
            r.joined_at&&r.proposal_data?(()=>{
              const p=typeof r.proposal_data==='string'?JSON.parse(r.proposal_data):r.proposal_data;

              const items=[p.nurse?nurseL[p.nurse]:null,p.fee?'料金:'+p.fee:null].filter(Boolean);
              return items.length?h('div',{style:{fontSize:'10px',color:'#1d4ed8',textAlign:'right'}},items.join('・')):null;
            })():null
          )
        )))
      )
    ));
  }

  // 受信者側：アクションボタン
  if(!isIssuer && !n.declined_at){
    if(stage===1){
      w.appendChild(h('div',{style:{display:'flex',gap:'12px',marginTop:'8px'}},
        btn('今回は辞退する','btn-sec',()=>{

          ));
          m.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'16px'}},
            btn('キャンセル','btn-sec',()=>{S.modal=null;rr()}),
            btn('辞退する','btn-danger',async()=>{
              const reason=document.getElementById('decline_reason_input')?.value?.trim()||'';
              if(!reason){toast('辞退理由を入力してください');return;}
              const res=await api('/discharge/'+n.id+'/decline',{method:'POST',body:JSON.stringify({reason})});
              if(res?.success){S.modal=null;S.noticeData=null;S.dischargeList=null;toast('辞退しました');S.page='discharge';rr();}
              else toast(res?.error||'エラー');
            })
          ));
          S.modal=m;rr();
        }),
        btn('面談に参加する','btn-pri',()=>{
          // 提案フォームモーダル
          const m=h('div',{className:'modal',style:{maxWidth:'520px'}});

          m.appendChild(h('p',{style:{fontSize:'12px',color:'var(--ink-m)',marginBottom:'16px'}},'参加表明と合わせて、候補日程への回答と施設情報を病院側に送ることができます'));

          // 候補日程○△×投票（LINEスタイル）
          if(n.schedule_slots&&n.schedule_slots.length){
            const voteState={};

                h('option',{value:'fulltime'},'24時間在籍'),

              h('label',{style:{fontSize:'12px'}},'保険外料金の目安'),

            ),
            h('div',{className:'field',style:{margin:'0',gridColumn:'1/-1'}},

    n.schedule_slots.forEach(sl=>{
      let okC=0,mayC=0,ngC=0;
      joinedRecs.forEach(r=>{

        if(v==='ok')okC++;else if(v==='maybe')mayC++;else if(v==='ng')ngC++;
      });
      const isConfirmed=n.confirmed_slot===sl.id;
      const allOk=totalVoters>0&&okC===totalVoters;
      const row=h('div',{style:{padding:'12px 14px',borderBottom:'1px solid #f1f5f9',background:isConfirmed?'#f0fdf4':allOk?'#f7fff7':''}},

                  if(res?.success){S.noticeData=null;api('/discharge/'+S.noticeId).then(r=>{S.noticeData=r;rr();});toast('日程を確定しました');}

      ));
    }
    w.appendChild(matSection);

  // 発行者側：面談URL設定パネル
  if(isIssuer){

    const hasMeetingUrl=!!(n.meeting_url);
    w.appendChild(h('div',{style:{marginTop:'16px',background:'#f8fafc',border:'1px solid var(--border)',borderRadius:'10px',padding:'14px 16px'}},

          )

function notificationsPage(){
  const w=h('div',{style:{padding:'24px',maxWidth:'680px'}});
  w.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}},
    h('h2',{style:{fontSize:'20px',fontWeight:'800',margin:'0'}},'通知'),
    S.unreadCount>0?h('button',{
      style:{fontSize:'12px',color:'var(--accent)',background:'none',border:'1px solid var(--accent)',borderRadius:'20px',cursor:'pointer',padding:'5px 14px',fontFamily:'inherit',fontWeight:'600'},
      onClick:async()=>{await api('/notifications/read-all',{method:'POST'});S.unreadCount=0;await loadNotifList();rr();}
    },'全て既読にする'):null
  ));

  if(!S.notifList){
    loadNotifList().then(()=>rr());
    w.appendChild(h('div',{style:{textAlign:'center',padding:'48px',color:'var(--ink-l)'}}),'読み込み中...');
    return w;
  }

  if(!S.notifList.length){
    w.appendChild(h('div',{style:{textAlign:'center',padding:'64px 48px',color:'var(--ink-l)',background:'var(--surface)',borderRadius:'16px',border:'1px solid var(--border)'}},
      h('div',{style:{fontWeight:'700',fontSize:'15px',marginBottom:'6px',color:'var(--ink)'}},'通知はありません'),
      h('div',{style:{fontSize:'13px'}},'新しい通知が届くとここに表示されます')
    ));
    return w;
  }

  // フィルターバー
  if(!S.notifFilter)S.notifFilter='all';
  const nFilterDefs=[
    {key:'all',l:'すべて'},{key:'unread',l:'未読'},{key:'read',l:'既読'},
    {key:'discharge',l:'退院通知'},{key:'nda',l:'NDA'},
  ];
  const filterBar=h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'16px'}});
  nFilterDefs.forEach(f=>{
    const isActive=S.notifFilter===f.key;
    filterBar.appendChild(h('button',{
      style:{padding:'4px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:isActive?'700':'400',
        background:isActive?'var(--accent)':'var(--surface)',color:isActive?'#fff':'var(--ink-m)',
        border:'1px solid '+(isActive?'var(--accent)':'var(--border)'),cursor:'pointer',fontFamily:'inherit'},
      onClick:()=>{S.notifFilter=f.key;rr()}
    },f.l));
  });
  w.appendChild(filterBar);

  const fk=S.notifFilter;
  const filtered=S.notifList.filter(n=>{
    if(fk==='all')return true;
    if(fk==='unread')return !n.is_read;
    if(fk==='read')return !!n.is_read;
    if(fk==='discharge')return n.type==='discharge'||n.type==='discharge_notice'||n.type==='notice_joined';
    if(fk==='nda')return n.type==='nda_request'||n.type==='nda_signed';
    return true;
  });

  if(!filtered.length){
    w.appendChild(h('div',{style:{padding:'32px',textAlign:'center',color:'var(--ink-l)',background:'var(--surface)',borderRadius:'10px',fontSize:'13px'}}),'該当する通知はありません');
    return w;
  }

  // 通知タイプ別カラーマップ
  const typeStyle={
    nda_request:{color:'#0891b2',bg:'#e0f2fe',border:'#bae6fd'},
    nda_signed:  {color:'#16a34a',bg:'#f0fdf4',border:'#bbf7d0'},
    discharge:   {color:'#7c3aed',bg:'#f5f3ff',border:'#ddd6fe'},
    discharge_notice:{color:'#7c3aed',bg:'#f5f3ff',border:'#ddd6fe'},
    notice_joined:{color:'#7c3aed',bg:'#f5f3ff',border:'#ddd6fe'},
    default:     {color:'#f97316',bg:'#fff7ed',border:'#fed7aa'},
  };

  const list=h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}});
  for(const n of filtered){
    const isUnread=!n.is_read;
    const ts=typeStyle[n.type]||typeStyle.default;
    const item=h('div',{
      style:{
        background:isUnread?ts.bg:'var(--surface)',
        border:'1px solid '+(isUnread?ts.border:'var(--border)'),
        borderRadius:'12px',padding:'14px 16px',cursor:'pointer',
        display:'flex',gap:'14px',alignItems:'flex-start',
        transition:'box-shadow 0.15s',
        boxShadow:isUnread?'0 1px 6px rgba(0,0,0,0.06)':'none'
      },
      onMouseEnter:e=>{e.currentTarget.style.boxShadow='0 2px 12px rgba(0,0,0,0.1)'},
      onMouseLeave:e=>{e.currentTarget.style.boxShadow=isUnread?'0 1px 6px rgba(0,0,0,0.06)':'none'},
      onClick:async()=>{
        if(isUnread){
          await api('/notifications/'+n.id+'/read',{method:'POST'});
          if(S.unreadCount>0)S.unreadCount--;
          n.is_read=1;
        }
        if(n.action_url){
          const patientMatch=n.action_url.match(/^#patient:(.+)$/);
          if(patientMatch){S.ptId=patientMatch[1];S.page='hub';S.hubTab='overview';rr();return;}
          const noticeMatch=n.action_url.match(/^#notice:(.+)$/);
          if(noticeMatch){S.noticeId=noticeMatch[1];S.noticeData=null;S.page='shared_chart';rr();return;}
          const pageMatch=n.action_url.match(/^#page:(.+)$/);
          if(pageMatch){S.page=pageMatch[1];rr();return;}
          window.open(n.action_url,'_blank');
        } else { rr(); }
      }
    },
      h('div',{style:{width:'8px',borderRadius:'4px',flexShrink:'0',alignSelf:'stretch',background:isUnread?ts.color:'#e2e8f0'}}),
      h('div',{style:{flex:'1',minWidth:'0'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'8px',marginBottom:'4px'}},
          h('div',{style:{fontWeight:isUnread?'700':'500',fontSize:'13px',color:isUnread?'var(--ink)':'var(--ink-m)',lineHeight:'1.5'}},n.title),
          h('div',{style:{fontSize:'11px',color:'var(--ink-l)',whiteSpace:'nowrap',flexShrink:'0',marginTop:'1px'}},
            new Date(n.created_at).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
          )
        ),
        h('div',{style:{fontSize:'12px',color:'var(--ink-l)',lineHeight:'1.6'}},n.body),
        isUnread?h('div',{style:{display:'inline-block',marginTop:'6px',fontSize:'10px',fontWeight:'700',color:ts.color,background:ts.bg,padding:'2px 8px',borderRadius:'20px',border:'1px solid '+ts.border}},'未読'):null
      )
    );
    list.appendChild(item);
  }
  w.appendChild(list);
  return w;
}

function rr(){const app=document.getElementById('app');app.innerHTML='';if(S.scr==='login')app.appendChild(loginScr());else if(S.scr==='signup')app.appendChild(signupScr());else if(S.scr==='resetpw')app.appendChild(resetpwScr());else if(S.scr==='changepw')app.appendChild(changepwScr());else if(S.scr==='staffRegister')app.appendChild(staffRegisterScr());else if(S.scr==='app')app.appendChild(appShell());if(S.toast){const ex=document.querySelector('.toast');if(ex)ex.remove();document.body.appendChild(h('div',{className:'toast'},S.toast))}}
// --- INIT ---
ld();
// Token-based auto-login
loadToken();
const savedEmail=(()=>{try{return localStorage.getItem('medadapt-autologin')||null}catch(e){return null}})();
function tryLocalLogin(){
  if(savedEmail){const u=findUser(savedEmail);if(u){S.user=u;S.scr='app';S.page='patients';rr();return true;}}
  return false;
}
// URLパラメータ処理（メール認証・パスワードリセット）
(async()=>{
  const params=new URLSearchParams(window.location.search);
  const verifyToken=params.get('verify');
  const resetToken=params.get('reset');
  const paramEmail=params.get('email');

  if(verifyToken&&paramEmail){
    // メールアドレス認証
    const res=await api('/auth/verify?token='+encodeURIComponent(verifyToken)+'&email='+encodeURIComponent(paramEmail),{});
    window.history.replaceState({},'',window.location.pathname);
    if(res&&res.success){
      S.scr='login';S.loginErr='';
      // 認証完了モーダル表示
      setTimeout(()=>{
        const m=document.createElement('div');
        m.id='verify-modal-overlay';
        m.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999';
        m.innerHTML='<div style="background:#fff;padding:32px;border-radius:16px;text-align:center;max-width:380px"><div style="font-size:48px;margin-bottom:12px">✅</div><div style="font-size:18px;font-weight:800;color:#0891b2;margin-bottom:8px">メール認証完了！</div><div style="font-size:13px;color:#64748b;margin-bottom:20px">アカウントが有効になりました。<br>ログインしてMedAdaptをお使いください。</div><button onclick="document.getElementById(\'verify-modal-overlay\').remove()" style="padding:10px 24px;background:#0891b2;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px">ログインする</button></div>';
        document.body.appendChild(m);
      },300);
    }else{
      S.scr='login';S.loginErr='認証リンクが無効または期限切れです';
    }
    rr();return;
  }

  // スタッフ招待リンク処理
  const inviteToken=params.get('invite');
  if(inviteToken){
    S.scr='staffRegister';
    S.inviteToken=inviteToken;
    try{sessionStorage.setItem('medadapt-invite-token',inviteToken);}catch(e){}
    window.history.replaceState({},'',window.location.pathname);
    rr();return;
  }
  // sessionStorageから招待トークン復元
  try{const saved=sessionStorage.getItem('medadapt-invite-token');if(saved&&!S.token){S.scr='staffRegister';S.inviteToken=saved;rr();return;}}catch(e){}

  // QRコードログイン
  const qrToken=params.get('qr');
  if(qrToken){
    window.history.replaceState({},'',window.location.pathname);
    const res=await api('/auth/qr-login',{method:'POST',body:JSON.stringify({qr_token:qrToken})});
    if(res&&res.token){
      saveToken(res.token);S.user=res.user;
      await loadFromCloud();
      S.scr='app';S.page='patients';
      toast(res.user.name+'さん、ログインしました');
      rr();return;
    }else{
      S.loginErr='QRコードが無効または期限切れです';
      S.scr='login';rr();return;
    }
  }

  if(resetToken){
    const paramLoginId=params.get('login_id');
    if(paramLoginId||paramEmail){
      // パスワードリセット画面（新PW設定モード）
      S.scr='resetpw';
      S.resetToken=resetToken;
      S.resetMode='set';
      S.resetLoginId=paramLoginId||null;
      S.resetEmail=paramEmail||'';
      S.resetSetDone=false;
      window.history.replaceState({},'',window.location.pathname);
      rr();return;
    }
  }

  // 通常の起動フロー
  if(window.location.hash==='#pro'){S.scr='signup';S.signupStep=1;S.signupPlan='pro';rr();}
  else if(window.location.hash==='#signup'){S.scr='signup';S.signupStep=1;S.signupPlan='free';rr();}
  else if(S.token){
    const res=await api('/sync');
    if(res&&res.user){
      S.user=res.user;
      if(res.patients&&res.patients.length)D.patients=res.patients;
      if(res.cases&&res.cases.length)D.cases=res.cases;
      if(res.conferences&&res.conferences.length)D.conferences=res.conferences;
      if(res.monitors&&res.monitors.length)D.monitors=res.monitors;
      if(res.assessments&&res.assessments.length)D.assessments=res.assessments;
      await checkModuleAccess();startNotifPolling();S.scr='app';S.page='patients';rr();
    }else if(tryLocalLogin()){}
    else{S.scr='login';rr();}
  }else if(tryLocalLogin()){}
  else{S.scr='login';rr();}
})();
</script>
